<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unified Device & Telemetry Laboratory</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #040406; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #0a1414; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010808;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 480px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .hardware { background: #ffaa00; }
    .telemetry { background: #00ffaa; }
</style>
</head>
<body>

<h2>Device & Telemetry Security Laboratory</h2>

<div class="panel">
    <h3> Automated Full-Chain Pipeline</h3>
    <p>Mengeksekusi rangkaian inspeksi arsitektur perangkat keras dan ekstraksi telemetri jaringan secara beruntun dalam satu siklus operasi instan.</p>
    <button id="launch-full-pipeline">Execute Automated Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

// PIPELINE UTAMAA: EKSEKUSI BERUNTUN TANPA INTERUPSI (CHAINING ENGINE)
document.getElementById("launch-full-pipeline").addEventListener("click", () => {
    writeLog('INIT', 'hardware', "Memulai rantai otonom: Menginspeksi properti runtime sistem...");

    // ==========================================
    // TAHAP 1: INSPEKSI DATA PERANGKAT NYATA
    // ==========================================
    
    // Membaca string UserAgent standar untuk mengurai tipe sistem operasi dasar
    const rawUA = navigator.userAgent;
    writeLog('UA_STRING', 'hardware', `Raw Metadata: ${rawUA}`);

    // Pemanfaatan UserAgentData API modern (jika didukung oleh browser target)
    if (navigator.userAgentData) {
        navigator.userAgentData.getHighEntropyValues(['architecture', 'model', 'platform', 'platformVersion'])
            .then(uaData => {
                writeLog('HARDWARE', 'hardware', "Hasil Dekode Komponen Sistem:");
                writeLog('HARDWARE', 'hardware', `   |-- Platform OS  : ${uaData.platform} (Versi: ${uaData.platformVersion || "N/A"})`);
                writeLog('HARDWARE', 'hardware', `   |-- Arsitektur CPU: ${uaData.architecture || "N/A"}`);
                writeLog('HARDWARE', 'hardware', `   |-- Mobile Node  : ${navigator.userAgentData.mobile ? "Perangkat Seluler (HP/Tablet)" : "Desktop/PC"}`);
                
                // Jika browser mengizinkan akses model generik, tampilkan hasilnya
                if (uaData.model) {
                    writeLog('HARDWARE', 'hardware', `   |-- Brand/Model  : ${uaData.model}`);
                }
                
                // Lanjutkan rantai secara asinkron ke tahap telemetri jaringan
                executeNetworkTelemetryStage();
            });
    } else {
        // Metode Fallback untuk browser lama berbasis ekspresi reguler
        writeLog('HARDWARE', 'hardware', "Mengekstrak tanda sistem dari objek navigator...");
        const isAndroid = /Android/i.test(rawUA);
        const isIOS = /iPhone|iPad|iPod/i.test(rawUA);
        
        let osType = "Unknown OS";
        if (isAndroid) osType = "Android System Interface";
        if (isIOS) osType = "iOS/Apple Darwin Interface";
        
        writeLog('HARDWARE', 'hardware', `   |-- Deteksi OS: ${osType}`);
        writeLog('HARDWARE', 'hardware', `   |-- Screen Node: W:${window.screen.width}px x H:${window.screen.height}px`);
        
        // Lanjutkan rantai secara asinkron ke tahap telemetri jaringan
        executeNetworkTelemetryStage();
    }
});

// ==========================================
// TAHAP 2: PIPELINE EKSTRAKSI TELEMETRI JARINGAN
// ==========================================
function executeNetworkTelemetryStage() {
    writeLog('TELEMETRY', 'telemetry', "Beralih ke Tahap 2: Memicu permintaan jaringan untuk mengumpulkan metrik asinkron...");

    // Memicu koneksi nyata ke internet untuk memperbarui memori Resource Timing peramban
    fetch('https://ipify.org')
        .then(res => res.json())
        .then(data => {
            writeLog('NET_DATA', 'telemetry', `Koneksi aktif terverifikasi. IP Gateway: ${data.ip}`);
            
            // Mengekstrak metrik pemrosesan dari runtime memori peramban secara instan
            const resources = performance.getEntriesByType("resource");
            
            resources.forEach((resource, index) => {
                // Memfilter entri agar fokus pada koneksi jaringan luar yang baru saja dipicu
                if (resource.name.includes('ipify')) {
                    writeLog(`CONN_METRIC`, 'telemetry', `Membongkar telemetri paket untuk endpoint internal...`);
                    
                    const dnsTime = Math.round(resource.domainLookupEnd - resource.domainLookupStart);
                    const tcpTime = Math.round(resource.connectEnd - resource.connectStart);
                    const ttfbTime = Math.round(resource.responseStart - resource.requestStart); // Time to First Byte
                    
                    writeLog(`TIMING`, 'telemetry', `   |-- Protokol Jaringan: ${resource.nextHopProtocol || "HTTP/1.1 (Cached/Secure)"}`);
                    writeLog(`TIMING`, 'telemetry', `   |-- Resolusi DNS   : ${dnsTime} ms`);
                    writeLog(`TIMING`, 'telemetry', `   |-- Jabat Tangan TCP: ${tcpTime} ms`);
                    writeLog(`TIMING`, 'telemetry', `   |-- Latensi Server (TTFB): ${ttfbTime} ms`);
                }
            });
            writeLog('FINISH', 'telemetry', "Rantai penuh eksekusi pipa otonom selesai.");
        })
        .catch(err => {
            writeLog('NET_ERR', 'telemetry', `Rantai telemetri terputus: ${err.message}`);
        });
}

writeLog('SYSTEM', 'hardware', "Mesin analisis pipa terpadu berhasil diinisialisasi.");
</script>
</body>
</html>
