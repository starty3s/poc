<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hardened Device & Network Telemetry Lab</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #040406; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #0a1414; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010808;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 520px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .hardware { background: #ffaa00; }
    .telemetry { background: #00ffaa; }
</style>
</head>
<body>

<h2>Device & Network Security Laboratory</h2>

<div class="panel">
    <h3> Hardened Automated Pipeline (Subnet: 10.40.38.x)</h3>
    <p>Mengeksekusi rangkaian inspeksi identitas perangkat keras (WebGL Fingerprinting) dan pemindaian port nirkabel lokal secara beruntun.</p>
    <button id="launch-hardened-chain">Execute Hardened Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

document.getElementById("launch-hardened-chain").addEventListener("click", () => {
    writeLog('INIT', 'hardware', "Memulai rantai otonom: Mengekstrak properti perangkat keras nyata...");

    // ==========================================
    // TAHAP 1: WEBGL GPU IDENTIFICATION (HARDWARE IDENTITY)
    // ==========================================
    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                
                writeLog('GPU_EXTRACT', 'hardware', "Hardware Driver Signature Detected:");
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Vendor  : ${vendor}`);
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Renderer: ${renderer}`);
            }
        }
    } catch (e) {
        writeLog('GPU_ERR', 'hardware', `Gagal ekstraksi fingerprint perangkat keras: ${e.message}`);
    }

    if (navigator.hardwareConcurrency) {
        writeLog('CPU_EXTRACT', 'hardware', `   |-- Kapasitas CPU: ${navigator.hardwareConcurrency} Logical Cores`);
    }
    if (navigator.deviceMemory) {
        writeLog('MEM_EXTRACT', 'hardware', `   |-- Estimasi RAM : ~${navigator.deviceMemory} GB`);
    }

    // Melanjutkan eksploitasi berantai dengan kalibrasi baseline dinamis
    calibrateNetworkAndScan();
});

// ==========================================
// TAHAP 2: KALIBRASI DINAMIS & MULTI-PORT SCANNING
// ==========================================
function calibrateNetworkAndScan() {
    writeLog('CALIBRATE', 'telemetry', "Mengukur latensi dasar jaringan menggunakan IP non-existent...");
    
    const fakeIp = "10.40.38.254"; // IP tiruan untuk mengukur waktu timeout lokal
    const startCalibration = performance.now();
    const testImg = new Image();
    
    // Menetapkan fungsi penanganan untuk kegagalan timeout
    const handleTimeout = () => {
        const timeoutBaseline = performance.now() - startCalibration;
        // Tetapkan ambang batas akurat (70% dari waktu timeout murni) untuk memfilter drop paket alami
        const adaptiveThreshold = Math.round(timeoutBaseline * 0.7);
        
        writeLog('CALIBRATE', 'telemetry', `   |-- Jeda TCP Timeout Jaringan : ${Math.round(timeoutBaseline)} ms`);
        writeLog('CALIBRATE', 'telemetry', `   |-- Ambang Batas Adaptif Akurat: < ${adaptiveThreshold} ms`);
        
        // Mulai pemindaian subnet menggunakan ambang batas hasil kalibrasi nyata
        executeAdvancedScan(adaptiveThreshold);
    };

    testImg.onerror = handleTimeout;
    testImg.onload = handleTimeout;
    
    // Picu jabat tangan timeout tiruan
    testImg.src = `http://${fakeIp}:29999/b.ico?r=${Math.random()}`;
}

function executeAdvancedScan(threshold) {
    const baseSubnet = "10.40.38";
    const targetPorts = [80, 443, 8080]; // Array multi-port untuk meningkatkan akurasi penemuan simpul aktif
    const targetHosts = Array.from({length: 30}, (_, i) => i + 1);

    writeLog('SCAN_INIT', 'telemetry', `Memicu Multi-Port Chaining pada rentang ${baseSubnet}.1 s/d ${baseSubnet}.30...`);

    targetHosts.forEach(host => {
        const targetIp = `${baseSubnet}.${host}`;
        
        targetPorts.forEach(port => {
            const startTime = performance.now();
            const img = new Image();
            
            img.onload = () => {
                writeLog(`ACTIVE_NODE`, 'telemetry', `Simpul terverifikasi aktif -> ${targetIp}:${port} (HTTP Berhasil Terbuka)`);
            };
            
            img.onerror = () => {
                const duration = performance.now() - startTime;
                // Menggunakan metrik hasil kalibrasi dinamis untuk akurasi tinggi
                if (duration < threshold) {
                    writeLog(`HOST_FOUND`, 'telemetry', `Indikasi simpul responsif pada alamat -> ${targetIp} (Port: ${port}) [Respon: ${Math.round(duration)}ms]`);
                }
            };
            
            // Pengiriman rute muatan lintas domain terdistribusi
            const protocol = port === 443 ? 'https' : 'http';
            img.src = `${protocol}://${targetIp}:${port}/favicon.ico?r=${Math.random()}`;
        });
    });

    writeLog('FINISH', 'telemetry', "Seluruh pipa pemindaian multi-port adaptif selesai dilepaskan.");
}

writeLog('SYSTEM', 'hardware', "Laboratorium pengujian identitas arsitektur nirkabel siap.");
</script>
</body>
</html>
