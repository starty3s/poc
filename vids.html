<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intent Navigation Test (Strict Standards)</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background-color: #ffffff;
      color: #000000;
    }
    .test-container {
      border: 1px solid #000000;
      padding: 20px;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-family: monospace;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Intent Schema Security Verification</h1>
  <p>Pengujian kepatuhan peramban terhadap pembatasan skema eksternal Android Intent menggunakan format spesifikasi penuh standar Chromium.</p>

  <div class="test-container">
    <button onclick="triggerIntent()">Uji Navigasi Intent (Bluetooth Settings)</button>
  </div>

  <script>
    function triggerIntent() {
      // Menggunakan sintaksis skema intent dengan deklarasi komponen dan fallback eksplisit
      // Sesuai dengan standar dokumentasi pengembang Chromium untuk intent URI Android
      const intentUrl = "intent:#Intent;" +
                        "action=android.settings.BLUETOOTH_SETTINGS;" +
                        "category=android.intent.category.DEFAULT;" +
                        "component=com.android.settings/.bluetooth.BluetoothSettings;" +
                        "end";
      
      try {
        // Melakukan penugasan lokasi secara langsung pada window top-level
        window.top.location = intentUrl;
      } catch (e) {
        console.error("Navigation blocked by browser security policy:", e.message);
      }
    }
  </script>

</body>
</html>
