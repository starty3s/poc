<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asynchronous Subnet Mapping Laboratory</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #030305; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #091414; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010a0a;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 380px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .scanner { background: #00ffaa; }
    .discovery { background: #ffaa00; }
</style>
</head>
<body>

<h2>Unified Network Topology Laboratory</h2>

<div class="panel">
    <h3> Passive Subnet Discovery Engine</h3>
    <p>Simulasi pemetaan keberadaan node aktif di satu segmen Wi-Fi tanpa memicu API Geolocation Perangkat.</p>
    <button id="start-passive-scan">Launch Passive Subnet Scan</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

// Simulasi Pemetaan Berantai Tanpa Ketergantungan Izin Lokasi GPS
document.getElementById("start-passive-scan").addEventListener("click", () => {
    writeLog('INIT', 'scanner', "Memulai inisialisasi soket pemindaian nirkabel internal...");
    writeLog('ARPMAP', 'scanner', "Membaca tabel ARP lokal untuk mengidentifikasi Mac Address gateway...");
    
    // Basis data simulasi node aktif di satu subnet Wi-Fi yang sama
    const activeNodes = [
        { ip: "172.30.200.1", type: "MikroTik RouterOS", name: "Main-Gateway-AP" },
        { ip: "172.30.200.5", type: "Android Client (Samsung)", name: "Galaxy-S23-User" },
        { ip: "172.30.200.12", type: "iOS Client (iPhone)", name: "iPhone-Staff-Finance" },
        { ip: "172.30.200.24", type: "Linux Workstation", name: "Lab-Server-Ubuntu" }
    ];

    let timeline = 0;

    activeNodes.forEach((node, index) => {
        timeline += 800;
        setTimeout(() => {
            writeLog(`NODE-${index+1}`, 'discovery', `Respons paket ICMP terdeteksi dari target -> ${node.ip}`);
            writeLog(`INFO-${index+1}`, 'discovery', `   |-- Device Vendor: ${node.type}`);
            writeLog(`INFO-${index+1}`, 'discovery', `   |-- Broadcast Name: ${node.name}.local (via mDNS)`);
            writeLog(`INFO-${index+1}`, 'discovery', `   |-- Status Layanan: Aktif (Port Terbuka: 80, 443, 5353)`);
            
            if (index === activeNodes.length - 1) {
                writeLog('FINISH', 'scanner', "Pemetaan topologi simpul lokal selesai. Seluruh target terdaftar.");
            }
        }, timeline);
    });
});

writeLog('SYSTEM', 'scanner', "Mesin analisis topologi nirkabel siap digunakan.");
</script>
</body>
</html>
