<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chrome Intent Launcher</title>

<style>
body{
    font-family:monospace;
    padding:20px;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
}

#log{
    margin-top:20px;
    border:1px solid #000;
    padding:10px;
    height:240px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>Chrome Android Intent Launcher</h2>

<button id="openBluetooth">
Open Bluetooth Settings
</button>

<button id="openWifi">
Open Wi-Fi Settings
</button>

<button id="openMain">
Open Main Settings
</button>

<div id="log"></div>

<script>

const logBox =
    document.getElementById("log");

function log(msg){

    const line =
        "[" + new Date().toLocaleTimeString() + "] " + msg;

    logBox.textContent += line + "\n";

    logBox.scrollTop =
        logBox.scrollHeight;

    console.log(line);
}

function buildIntent(action){

    return (
        "intent:#Intent;" +
        "action=" + action + ";" +
        "category=android.intent.category.DEFAULT;" +
        "launchFlags=0x10000000;" +
        "end"
    );
}

function launchIntent(action){

    const uri = buildIntent(action);

    log("Launching:");
    log(uri);

    try{

        /*
         * Chrome-compatible navigation.
         * Requires direct user gesture.
         */

        const anchor =
            document.createElement("a");

        anchor.href = uri;

        anchor.style.display = "none";

        document.body.appendChild(anchor);

        anchor.click();

        setTimeout(() => {

            anchor.remove();

        }, 1000);

    }catch(err){

        log(
            "Launch blocked => " +
            err.message
        );

    }
}

document
.getElementById("openBluetooth")
.addEventListener("click", () => {

    launchIntent(
        "android.settings.BLUETOOTH_SETTINGS"
    );

});

document
.getElementById("openWifi")
.addEventListener("click", () => {

    launchIntent(
        "android.settings.WIFI_SETTINGS"
    );

});

document
.getElementById("openMain")
.addEventListener("click", () => {

    launchIntent(
        "android.settings.SETTINGS"
    );

});

log("Intent launcher ready");

</script>
</body>
</html>
