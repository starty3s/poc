<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hardened Multi-Port Service Fingerprinting Lab</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #040406; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #0a1414; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010808;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 550px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .hardware { background: #ffaa00; }
    .telemetry { background: #00ffaa; }
    .fingerprint { background: #ff3333; color: #fff; }
</style>
</head>
<body>

<h2>Device & Network Security Laboratory</h2>

<div class="panel">
    <h3> Hardened Fingerprinting Chain (Subnet: 10.40.38.x)</h3>
    <p>Eksekusi beruntun: WebGL Driver Inspection -> Dynamic Baseline Calibration -> Multi-Port Port Scanning -> Cross-Origin Service Fingerprinting.</p>
    <button id="launch-hardened-chain">Execute Advanced Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

document.getElementById("launch-hardened-chain").addEventListener("click", () => {
    writeLog('STAGE-1', 'hardware', "Memulai Rantai 1: Inspeksi Driver Grafis & Perangkat Keras Lokal...");

    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Vendor  : ${gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)}`);
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Renderer: ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}`);
            }
        }
    } catch (e) {
        writeLog('GPU_ERR', 'hardware', `Gagal fingerprint hardware: ${e.message}`);
    }

    if (navigator.hardwareConcurrency) writeLog('CPU_EXTRACT', 'hardware', `   |-- CPU Cores   : ${navigator.hardwareConcurrency} Logical Cores`);
    if (navigator.deviceMemory) writeLog('MEM_EXTRACT', 'hardware', `   |-- RAM Estimate: ~${navigator.deviceMemory} GB`);

    // Pindah otomatis ke tahap berikutnya dalam rantai serangan
    calibrateNetworkAndScan();
});

function calibrateNetworkAndScan() {
    writeLog('STAGE-2', 'telemetry', "Memulai Rantai 2: Kalibrasi Ambang Batas Waktu Jaringan...");
    
    const fakeIp = "10.40.38.254";
    const startCalibration = performance.now();
    const testImg = new Image();
    
    const handleTimeout = () => {
        const timeoutBaseline = performance.now() - startCalibration;
        const adaptiveThreshold = Math.round(timeoutBaseline * 0.7);
        
        writeLog('CALIBRATE', 'telemetry', `   |-- Base TCP Timeout : ${Math.round(timeoutBaseline)} ms`);
        writeLog('CALIBRATE', 'telemetry', `   |-- Adaptive Limit   : < ${adaptiveThreshold} ms`);
        
        // Pindah otomatis ke tahap pemindaian
        executeAdvancedScan(adaptiveThreshold);
    };

    testImg.onerror = handleTimeout;
    testImg.onload = handleTimeout;
    testImg.src = `http://${fakeIp}:29999/b.ico?r=${Math.random()}`;
}

function executeAdvancedScan(threshold) {
    writeLog('STAGE-3', 'telemetry', "Memulai Rantai 3: Meluncurkan Multi-Port Active Reconnaissance...");
    
    const baseSubnet = "10.40.38";
    const targetPorts = [80, 443, 8080];
    const targetHosts = Array.from({length: 30}, (_, i) => i + 1);

    targetHosts.forEach(host => {
        const targetIp = `${baseSubnet}.${host}`;
        
        targetPorts.forEach(port => {
            const startTime = performance.now();
            const img = new Image();
            
            img.onload = () => {
                writeLog(`ACTIVE_PORT`, 'telemetry', `Simpul terverifikasi aktif -> ${targetIp}:${port}`);
                // Rantai Lanjutan: Jika port terbuka, lakukan pencarian sidik jari identitas perangkat
                inspectServiceFingerprint(targetIp, port);
            };
            
            img.onerror = () => {
                const duration = performance.now() - startTime;
                if (duration < threshold) {
                    writeLog(`HOST_RESP`, 'telemetry', `Respons cepat terdeteksi pada -> ${targetIp}:${port} [${Math.round(duration)}ms]`);
                    // Rantai Lanjutan: Respons cepat menandakan port aktif/menolak, lakukan fingerprinting signature
                    inspectServiceFingerprint(targetIp, port);
                }
            };
            
            const protocol = port === 443 ? 'https' : 'http';
            img.src = `${protocol}://${targetIp}:${port}/favicon.ico?r=${Math.random()}`;
        });
    });
}

// ==========================================
// TAHAP 4: SERVICE FINGERPRINTING (RANTAI TERAKHIR)
// ==========================================
function inspectServiceFingerprint(ip, port) {
    // Basis data signature berkas unik untuk menebak jenis perangkat infrastruktur di jaringan
    const signatures = [
        { name: "MikroTik RouterOS WebFig", path: "/webfig/img/logo.png" },
        { name: "TP-Link Admin Panel", path: "/images/logo.jpg" },
        { name: "Linksys Smart Wi-Fi Interface", path: "/ui/1.0.0/dynamic/images/logo.png" },
        { name: "Generic IP Camera / Printer WebUI", path: "/localui/hp/images/hp-logo.gif" }
    ];

    signatures.forEach(sig => {
        const checkImg = new Image();
        const protocol = port === 443 ? 'https' : 'http';
        
        checkImg.onload = () => {
            // Jika berkas gambar spesifik vendor berhasil dimuat, identitas perangkat terkonfirmasi rentan terpetakan
            writeLog('IDENTIFIED', 'fingerprint', `[FINGERPRINT MATCH] Perangkat pada ${ip}:${port} teridentifikasi sebagai: ${sig.name}`);
        };
        
        // Mengarahkan ke jalur berkas privat milik firmware vendor
        checkImg.src = `${protocol}://${ip}:${port}${sig.path}?r=${Math.random()}`;
    });
}

writeLog('SYSTEM', 'telemetry', "Laboratorium otomatisasi rantai pengenal aset nirkabel aktif.");
</script>
</body>
</html>
