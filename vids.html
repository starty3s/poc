<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hardened Cross-Origin Network Laboratory</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #020204; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #05140f; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010604;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 550px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .hardware { background: #ffaa00; }
    .telemetry { background: #00ffaa; }
    .fingerprint { background: #ff3333; color: #fff; }
</style>
</head>
<body>

<h2>Cross-Origin Security Laboratory</h2>

<div class="panel">
    <h3> Enhanced Side-Channel Extraction Pipeline (Subnet: 10.40.38.x)</h3>
    <p>Rantai Analisis: System Hardware Enumeration -> Asynchronous Cross-Origin Timing Probing -> Signature Vector Cross-Matching -> Report Compilation.</p>
    <button id="launch-hardened-chain">Launch Enhanced Pipeline</button>
    <button id="export-log-report" style="background: #1f0f0f; border-color: #ff3333; color: #ff3333; display: none;">Download Technical Report (.TXT)</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");
let auditReports = []; 

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    
    auditReports.push(`[${timestamp}] [${phase}] [${type.toUpperCase()}] ${text}`);
    
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

document.getElementById("launch-hardened-chain").addEventListener("click", () => {
    writeLog('STAGE-1', 'hardware', "Menginisialisasi enumerasi arsitektur runtime lokal...");
    document.getElementById("export-log-report").style.display = "none";

    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                writeLog('GPU_INFO', 'hardware', `   |-- Vendor Subsystem  : ${gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)}`);
                writeLog('GPU_INFO', 'hardware', `   |-- Renderer Core     : ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}`);
            }
        }
    } catch (e) {
        writeLog('GPU_ERR', 'hardware', `Akses WebGL dibatasi: ${e.message}`);
    }

    if (navigator.hardwareConcurrency) writeLog('CPU_INFO', 'hardware', `   |-- Logical Thread Cores : ${navigator.hardwareConcurrency}`);
    if (navigator.deviceMemory) writeLog('MEM_INFO', 'hardware', `   |-- Allocatable RAM Info : ~${navigator.deviceMemory} GB`);

    executeAsynchronousDiscovery();
});

// STRATEGI OPTIMASI: Diferensiasi Respons Error Berkecepatan Tinggi
function executeAsynchronousDiscovery() {
    writeLog('STAGE-2', 'telemetry', "Mengaktifkan pipa pemindaian asinkron lintas domain...");
    
    const baseSubnet = "10.40.38";
    // Port yang diizinkan peramban untuk interaksi tipe media dan administrasi lokal
    const targetPorts = [80, 443, 3000, 5000, 5555, 8008, 8009, 8080, 8081, 8888, 9000];
    const targetHosts = Array.from({length: 30}, (_, i) => i + 1);

    writeLog('DISCOVERY', 'telemetry', `Menyebarkan vektor penemuan objek gambar ke segmen jaringan lokal...`);

    targetHosts.forEach(host => {
        const targetIp = `${baseSubnet}.${host}`;
        
        targetPorts.forEach(port => {
            const startTime = performance.now();
            const img = new Image();
            
            // Mengukur perbedaan durasi respons kesalahan (Error Timing Differentiation)
            const evaluateNetworkState = () => {
                const elapsed = performance.now() - startTime;
                
                // Respons di bawah 250ms mengonfirmasi interaksi aktif (Reset/Refused paket dari host)
                if (elapsed < 250) {
                    writeLog(`ACTIVE_SIMPUL`, 'telemetry', `Respons jaringan terdeteksi pada -> ${targetIp}:${port} [${Math.round(elapsed)}ms]`);
                    executeSignatureCrossMatch(targetIp, port);
                }
            };

            img.onload = () => {
                writeLog(`OPEN_RESOURCE`, 'telemetry', `Sumber daya web lintas domain merespons sukses -> ${targetIp}:${port}`);
                executeSignatureCrossMatch(targetIp, port);
            };
            
            img.onerror = evaluateNetworkState;
            
            const protocol = port === 443 ? 'https' : 'http';
            // Pemuatan objek gambar aset standar untuk memicu penanganan kesalahan TCP
            img.src = `${protocol}://${targetIp}:${port}/favicon.ico?cache_bust=${Math.random()}`;
        });
    });

    setTimeout(() => {
        writeLog('COMPLETED', 'telemetry', "Seluruh saluran interaksi asinkron nirkabel selesai diproses.");
        document.getElementById("export-log-report").style.display = "block";
    }, 2000);
}

// STRATEGI RANTAI AKHIR: Pemetaan Vektor Aset Firmware Vendor
function executeSignatureCrossMatch(ip, port) {
    const serviceVectors = [
        { identity: "MikroTik RouterOS Interface", assetPath: "/webfig/img/logo.png" },
        { identity: "TP-Link Administrator WebUI", assetPath: "/images/logo.jpg" },
        { identity: "Linksys Smart Wi-Fi Gateway", assetPath: "/ui/1.0.0/dynamic/images/logo.png" },
        { identity: "Android Chromecast / Media Daemon", assetPath: "/ss/logo.png" },
        { identity: "Smart TV Media Cast Receiver", assetPath: "/cp/icon.png" },
        { identity: "Apple AirPlay Protocol Daemon", assetPath: "/ServerIcon.png" },
        { identity: "HP JetDirect Integrated WebOS", assetPath: "/localui/hp/images/hp-logo.gif" },
        { identity: "Epson Network Printer Interface", assetPath: "/PRESENTATION/EPSON_LOGO.GIF" }
    ];

    serviceVectors.forEach(vector => {
        const fingerprintImg = new Image();
        const protocol = port === 443 ? 'https' : 'http';
        
        fingerprintImg.onload = () => {
            // Pemanggilan aset gambar unik vendor sukses mengonfirmasi klasifikasi firmware perangkat target
            writeLog('MATCH_FOUND', 'fingerprint', `[SIGNATURE MATCH] Endpoint ${ip}:${port} terkonfirmasi sebagai: ${vector.identity}`);
        };
        
        fingerprintImg.src = `${protocol}://${ip}:${port}${vector.assetPath}?cb=${Math.random()}`;
    });
}

// KOMPONEN PELAPORAN DATA (BLOB DOWNLOADER)
document.getElementById("export-log-report").addEventListener("click", () => {
    if (auditReports.length === 0) return;
    
    const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
    const downloadAnchor = document.createElement("a");
    
    downloadAnchor.download = `network_security_report_${Date.now()}.txt`;
    downloadAnchor.href = window.URL.createObjectURL(textBlob);
    downloadAnchor.style.display = "none";
    
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
});
</script>
</body>
</html>
