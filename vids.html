<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bluetooth VRP Research Harness</title>

<style>
body{
    font-family:monospace;
    padding:20px;
    background:#fff;
    color:#000;
}

.grid{
    display:grid;
    gap:12px;
}

.card{
    border:1px solid #000;
    padding:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
}

#log{
    margin-top:20px;
    border:1px solid #000;
    padding:10px;
    height:320px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>Bluetooth Compatibility Research Harness</h2>

<div class="grid">

<div class="card">

<button id="envBtn">
Environment Probe
</button>

<button id="checkBt">
Check Web Bluetooth
</button>

<button id="requestBt">
Request Bluetooth Device
</button>

<button id="openBtSettings">
Open Bluetooth Settings
</button>

<button id="observeLifecycle">
Install Lifecycle Observer
</button>

</div>

</div>

<div id="log"></div>

<script>

const logger =
    document.getElementById("log");

let activeDevice = null;

const ENV = {

    ua: navigator.userAgent,

    android:
        /Android/i.test(navigator.userAgent),

    chrome:
        /Chrome/i.test(navigator.userAgent),

    webview:
        /(wv|Version\/[\d.]+).*Chrome/i
        .test(navigator.userAgent),

    secureContext:
        window.isSecureContext,

    bluetooth:
        "bluetooth" in navigator

};

function log(msg){

    const line =
        "[" + new Date().toLocaleTimeString() + "] " + msg;

    logger.textContent += line + "\n";

    logger.scrollTop = logger.scrollHeight;

    console.log(line);
}

function dumpEnvironment(){

    log("=== ENVIRONMENT ===");

    log(JSON.stringify(ENV,null,2));
}

function buildIntent(action){

    return (
        "intent:#Intent;" +
        "action=" + action + ";" +
        "category=android.intent.category.DEFAULT;" +
        "end"
    );
}

function openBluetoothSettings(){

    const uri = buildIntent(
        "android.settings.BLUETOOTH_SETTINGS"
    );

    log("Dispatch Bluetooth settings intent");

    log(uri);

    try{

        /*
         * Standard navigation only.
         * No javascript: nesting.
         * No top-frame escalation.
         */

        window.location.assign(uri);

    }catch(err){

        log("BLOCKED => " + err.message);

    }
}

async function checkBluetooth(){

    log("Checking Bluetooth support");

    if(!window.isSecureContext){

        log("Secure context required");

        return;
    }

    if(!navigator.bluetooth){

        log("Web Bluetooth unsupported");

        return;
    }

    try{

        const availability =
            await navigator.bluetooth.getAvailability();

        log(
            "Bluetooth availability => " +
            availability
        );

    }catch(err){

        log(
            "Availability error => " +
            err.message
        );

    }
}

async function requestBluetoothDevice(){

    log("Requesting Bluetooth device");

    if(!navigator.bluetooth){

        log("Bluetooth API unavailable");

        return;
    }

    try{

        const device =
            await navigator.bluetooth.requestDevice({

                acceptAllDevices: true,

                optionalServices: [
                    "battery_service",
                    "device_information"
                ]

            });

        activeDevice = device;

        log(
            "DEVICE NAME => " +
            (device.name || "unknown")
        );

        log(
            "DEVICE ID => " +
            device.id
        );

        device.addEventListener(
            "gattserverdisconnected",
            () => {

                log(
                    "GATT disconnected"
                );

            }
        );

        log("Device listener attached");

    }catch(err){

        log(
            "REQUEST ERROR => " +
            err.message
        );

    }
}

function installLifecycleObservers(){

    log("Installing lifecycle observers");

    [
        "visibilitychange",
        "focus",
        "blur",
        "pageshow",
        "pagehide"
    ].forEach(evt => {

        window.addEventListener(evt, () => {

            log(
                "EVENT => " +
                evt +
                " | hidden=" +
                document.hidden
            );

        });

    });

}

document
.getElementById("envBtn")
.addEventListener("click", dumpEnvironment);

document
.getElementById("checkBt")
.addEventListener("click", checkBluetooth);

document
.getElementById("requestBt")
.addEventListener(
    "click",
    requestBluetoothDevice
);

document
.getElementById("openBtSettings")
.addEventListener(
    "click",
    openBluetoothSettings
);

document
.getElementById("observeLifecycle")
.addEventListener(
    "click",
    installLifecycleObservers
);

log("Bluetooth VRP harness initialized");

</script>
</body>
</html>
