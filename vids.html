<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maximum Aggressive Network Fingerprinting Lab</title>
<style>
    body {
        font-family: 'Courier New', monospace; 
        padding: 20px; 
        background: #040406; 
        color: #00ffaa;
    }
    h2, h3 { text-transform: uppercase; letter-spacing: 1px; color: #00ffaa; }
    button {
        width: 100%; padding: 18px; margin-top: 12px; 
        background: #0a1414; color: #00ffaa; 
        border: 1px solid #00ffaa; font-weight: bold; 
        cursor: pointer; font-size: 13px; text-transform: uppercase;
    }
    button:hover { background: #00ffaa; color: #000; box-shadow: 0 0 15px #00ffaa; }
    .panel {
        border: 1px solid #00ffaa; padding: 15px; 
        margin-bottom: 15px; background: #010808;
    }
    #console-log {
        margin-top: 20px; border: 1px solid #00ffaa; padding: 12px; 
        height: 550px; overflow: auto; white-space: pre-wrap; 
        background: #000; font-size: 11px; color: #00ff55;
    }
    .role-tag { font-weight: bold; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #000; }
    .hardware { background: #ffaa00; }
    .telemetry { background: #00ffaa; }
    .fingerprint { background: #ff3333; color: #fff; }
</style>
</head>
<body>

<h2>Maximum Aggressive Network Laboratory</h2>

<div class="panel">
    <h3> Hardened Multi-Port & Service Extraction (Subnet: 10.40.38.x)</h3>
    <p>Rantai Eksekusi Agresif: WebGL Extraction -> Baseline Tuning -> Aggressive Permissible Port Discovery -> Cross-Origin Signature Matching -> Report Generation.</p>
    <button id="launch-hardened-chain">Launch Aggressive Chain</button>
    <button id="export-log-report" style="background: #142414; display: none;">Download Audit Report (.TXT)</button>
</div>

<div id="console-log"></div>

<script>
const consoleLog = document.getElementById("console-log");
let auditReports = []; // Menyimpan semua data hasil audit untuk fungsi ekspor

function writeLog(phase, type, text) {
    const timestamp = new Date().toLocaleTimeString();
    let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
    
    // Simpan ke array laporan mentah
    auditReports.push(`[${timestamp}] [${phase}] [${type.toUpperCase()}] ${text}`);
    
    consoleLog.innerHTML += `[${timestamp}] [${phase}] ${tag} ${text}\n`;
    consoleLog.scrollTop = consoleLog.scrollHeight;
}

document.getElementById("launch-hardened-chain").addEventListener("click", () => {
    writeLog('STAGE-1', 'hardware', "Memulai Rantai 1: Inspeksi Driver Grafis & Perangkat Keras Lokal...");
    document.getElementById("export-log-report").style.display = "none";

    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Vendor  : ${gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL)}`);
                writeLog('GPU_EXTRACT', 'hardware', `   |-- GPU Renderer: ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}`);
            }
        }
    } catch (e) {
        writeLog('GPU_ERR', 'hardware', `Gagal fingerprint hardware: ${e.message}`);
    }

    if (navigator.hardwareConcurrency) writeLog('CPU_EXTRACT', 'hardware', `   |-- CPU Cores   : ${navigator.hardwareConcurrency} Logical Cores`);
    if (navigator.deviceMemory) writeLog('MEM_EXTRACT', 'hardware', `   |-- RAM Estimate: ~${navigator.deviceMemory} GB`);

    calibrateNetworkAndScan();
});

function calibrateNetworkAndScan() {
    writeLog('STAGE-2', 'telemetry', "Memulai Rantai 2: Kalibrasi Ambang Batas Waktu Jaringan...");
    
    const fakeIp = "10.40.38.254";
    const startCalibration = performance.now();
    const testImg = new Image();
    
    const handleTimeout = () => {
        const timeoutBaseline = performance.now() - startCalibration;
        const adaptiveThreshold = Math.round(timeoutBaseline * 0.7);
        
        writeLog('CALIBRATE', 'telemetry', `   |-- Base TCP Timeout : ${Math.round(timeoutBaseline)} ms`);
        writeLog('CALIBRATE', 'telemetry', `   |-- Adaptive Limit   : < ${adaptiveThreshold} ms`);
        
        executeAdvancedScan(adaptiveThreshold);
    };

    testImg.onerror = handleTimeout;
    testImg.onload = handleTimeout;
    testImg.src = `http://${fakeIp}:29999/b.ico?r=${Math.random()}`;
}

function executeAdvancedScan(threshold) {
    writeLog('STAGE-3', 'telemetry', "Memulai Rantai 3: Meluncurkan Aggressive Multi-Port Reconnaissance...");
    
    const baseSubnet = "10.40.38";
    
    // DAFTAR MAKSIMAL PORT YANG DIKATEGORIKAN AMAN & SERING DIBUKA OLEH PERANGKAT LOKAL:
    // 80, 443 (Web/SSL), 8008, 8009 (Chrometarget/Smart TV), 8080, 8081, 8888 (Aplikasi/Web Proxy HTTP lokal pada ponsel)
    // 5555 (ADB Web Android OS), 9000 (Layanan Media Port), 5000 (DLNA / Media Server), 3000 (Development node)
    const targetPorts = [80, 443, 3000, 5000, 5555, 8008, 8009, 8080, 8081, 8888, 9000];
    const targetHosts = Array.from({length: 30}, (_, i) => i + 1);

    targetHosts.forEach(host => {
        const targetIp = `${baseSubnet}.${host}`;
        
        targetPorts.forEach(port => {
            const startTime = performance.now();
            const img = new Image();
            
            img.onload = () => {
                writeLog(`ACTIVE_PORT`, 'telemetry', `Simpul terverifikasi aktif -> ${targetIp}:${port}`);
                inspectServiceFingerprint(targetIp, port);
            };
            
            img.onerror = () => {
                const duration = performance.now() - startTime;
                if (duration < threshold) {
                    writeLog(`HOST_RESP`, 'telemetry', `Respons cepat terdeteksi pada -> ${targetIp}:${port} [${Math.round(duration)}ms]`);
                    inspectServiceFingerprint(targetIp, port);
                }
            };
            
            const protocol = port === 443 ? 'https' : 'http';
            img.src = `${protocol}://${targetIp}:${port}/favicon.ico?r=${Math.random()}`;
        });
    });

    // Munculkan tombol download laporan setelah eksekusi pipa selesai dilepaskan
    setTimeout(() => {
        writeLog('FINISH', 'telemetry', "Seluruh rantai pipa pemindaian adaptif agresif selesai disebarkan.");
        document.getElementById("export-log-report").style.display = "block";
    }, 2000);
}

function inspectServiceFingerprint(ip, port) {
    const signatures = [
        { name: "MikroTik RouterOS WebFig Management", path: "/webfig/img/logo.png" },
        { name: "TP-Link Networking Device Interface", path: "/images/logo.jpg" },
        { name: "Linksys Routing Appliance UI", path: "/ui/1.0.0/dynamic/images/logo.png" },
        { name: "Android MediaServer / Chromecast Target", path: "/ss/logo.png" },
        { name: "Smart TV / Cast Receiver Service", path: "/cp/icon.png" },
        { name: "Apple AirPlay / Bonjour Daemon Web", path: "/ServerIcon.png" },
        { name: "HP JetDirect Printer Integrated WebOS", path: "/localui/hp/images/hp-logo.gif" },
        { name: "Epson Network Printing Node UI", path: "/PRESENTATION/EPSON_LOGO.GIF" }
    ];

    signatures.forEach(sig => {
        const checkImg = new Image();
        const protocol = port === 443 ? 'https' : 'http';
        
        checkImg.onload = () => {
            writeLog('IDENTIFIED', 'fingerprint', `[FINGERPRINT MATCH] Perangkat pada ${ip}:${port} terurai sebagai: ${sig.name}`);
        };
        
        checkImg.src = `${protocol}://${ip}:${port}${sig.path}?r=${Math.random()}`;
    });
}

// ARSITEKTUR TERAKHIR: MODUL EKSPOR LAPORAN LOG AUTOMATIS (.TXT DOWNLOADER)
document.getElementById("export-log-report").addEventListener("click", () => {
    if (auditReports.length === 0) return;
    
    const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
    const downloadAnchor = document.createElement("a");
    
    downloadAnchor.download = `network_audit_report_${Math.round(Date.now()/1000)}.txt`;
    downloadAnchor.href = window.URL.createObjectURL(textBlob);
    downloadAnchor.style.display = "none";
    
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
});

writeLog('SYSTEM', 'telemetry', "Laboratorium otomatisasi rantai pengenal aset agresif siap.");
</script>
</body>
</html>
