<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤣 Pilihan Sulit WKWK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Comic Sans MS",Arial;
}


body{

height:100vh;
overflow:hidden;
text-align:center;
color:white;

background:url("8.jpeg") center/cover;

}



body:before{

content:"";

position:fixed;

width:100%;
height:100%;

background:rgba(0,0,0,.4);

z-index:-1;

}




.container{

padding-top:40px;

}




h1{

font-size:45px;

text-shadow:
3px 3px red,
0 0 20px yellow;

animation:goyang 1s infinite alternate;

}


@keyframes goyang{

from{
transform:rotate(-5deg);
}

to{
transform:rotate(5deg);
}

}




.meme{

width:220px;

height:220px;

object-fit:cover;

border-radius:30px;

border:5px solid white;

box-shadow:0 0 30px black;

animation:loncat 2s infinite;

}



@keyframes loncat{

50%{
transform:translateY(-20px);
}

}





p{

font-size:25px;

margin:20px;

}




button{

padding:15px 40px;

border:none;

border-radius:50px;

font-size:22px;

cursor:pointer;

margin:20px;

font-weight:bold;

}




#funda{

background:#ff1493;

color:white;

}




#jimin{

background:#333;

color:white;

position:absolute;

}




#hasil{

display:none;

font-size:30px;

margin-top:30px;

}




.link{

display:inline-block;

margin-top:20px;

background:red;

color:white;

padding:15px 30px;

border-radius:40px;

text-decoration:none;

}





.emoji{

position:fixed;

font-size:45px;

pointer-events:none;

animation:naik 2s forwards;

z-index:999;

}



@keyframes naik{

to{

transform:translateY(-250px) scale(2) rotate(360deg);

opacity:0;

}

}





.balon{

position:fixed;

bottom:-100px;

font-size:60px;

animation:balon 6s linear forwards;

z-index:998;

}



@keyframes balon{

to{

transform:translateY(-120vh) rotate(360deg);

}

}




</style>

</head>


<body>



<div class="container">


<h1>
🤣 PILIH YANG BENAR 🤣
</h1>


<img class="meme" src="7.jpeg">



<p>
Siapa yang paling cocok jadi orang spesial? 😏
</p>



<button id="funda" onclick="pilihFunda()">

❤️ Kim Funda

</button>



<button id="jimin" onmouseover="kabur()">

🤣 Agus Jimin

</button>




<div id="hasil">

🎉 WKWKWK BENAR!!

<br><br>

Kamu memilih Kim Funda 😎

<br>

SALAM PLENGER 🤣

<br><br>


<a class="link" href="https://starty3s.github.io/poc/poc">

🚀 LANJUT KE HADIAH

</a>


</div>



</div>





<audio id="klik">

<source src="lucu.mp3" type="audio/mpeg">

</audio>





<script>


// tombol jimin kabur


function kabur(){

let btn=document.getElementById("jimin");


btn.style.left=Math.random()*80+"vw";

btn.style.top=Math.random()*80+"vh";


}







// pilih funda


function pilihFunda(){


document.getElementById("hasil").style.display="block";


ledakan();


}






// setiap klik suara + emoji + balon


document.addEventListener("click",function(e){



let suara=document.getElementById("klik");


suara.currentTime=0;


suara.play();





let emoji=[

"🤣",
"😂",
"❤️",
"🎉",
"🔥",
"🥳",
"😎",
"🤪",
"💰"

];



for(let i=0;i<8;i++){


let x=document.createElement("div");


x.className="emoji";


x.innerHTML=
emoji[Math.floor(Math.random()*emoji.length)];



x.style.left=
e.clientX+(Math.random()*100-50)+"px";

x.style.top=
e.clientY+(Math.random()*50-25)+"px";



document.body.appendChild(x);



setTimeout(()=>{

x.remove();

},2000);


}






let b=document.createElement("div");


b.className="balon";


b.innerHTML=[
"🎈",
"🎈",
"⭐",
"🎉"
][Math.floor(Math.random()*4)];



b.style.left=Math.random()*100+"vw";


document.body.appendChild(b);



setTimeout(()=>{

b.remove();

},6000);



});







function ledakan(){


for(let i=0;i<50;i++){


let x=document.createElement("div");


x.className="emoji";


x.innerHTML="🎉";


x.style.left=Math.random()*100+"vw";

x.style.top="60%";


document.body.appendChild(x);


setTimeout(()=>{

x.remove();

},2000);



}


}



</script>


</body>
</html>
