<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤣 Pilih Orang Spesial</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:"Comic Sans MS",Arial;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
}


.container{
padding-top:40px;
}


h1{

font-size:45px;
animation:goyang 1s infinite alternate;
text-shadow:0 0 20px black;

}


@keyframes goyang{

from{
transform:rotate(-4deg);
}

to{
transform:rotate(4deg);
}

}



img{

width:220px;
height:220px;
border-radius:30px;
object-fit:cover;
border:5px solid white;
box-shadow:0 0 30px black;

animation:loncat 2s infinite;

}


@keyframes loncat{

50%{
transform:translateY(-15px);
}

}




button{

font-size:25px;
padding:15px 35px;
border:0;
border-radius:50px;
cursor:pointer;
margin:20px;

}


#funda{

background:#ff1493;
color:white;

}



#jimin{

background:#333;
color:white;

position:absolute;

}




#hasil{

display:none;
font-size:30px;
margin-top:30px;

}


a{

display:inline-block;
margin-top:20px;
padding:15px 30px;
background:red;
color:white;
border-radius:40px;
text-decoration:none;

}





.emoji{

position:fixed;
font-size:40px;
animation:naik 2s forwards;

}



@keyframes naik{

to{

transform:translateY(-200px) scale(2);

opacity:0;

}

}



</style>

</head>


<body>


<div class="container">


<h1>
🤣 PILIH YANG BENAR 🤣
</h1>


<img src="https://i.imgflip.com/30b1gx.jpg">


<p>
Siapa yang paling cocok? Jangan salah pilih 😏
</p>


<button id="funda" onclick="funda()">
❤️ Kim Funda
</button>


<button id="jimin" onmouseover="kabur()">
🤣 Agus Jimin
</button>



<div id="hasil">

🎉 WKWKWK BENAR!!

<br>

Kamu memilih Kim Funda 😎

<br>

<a href="https://starty3s.github.io/poc/poc">
🚀 LANJUT KE HADIAH
</a>

</div>


</div>



<!-- AUDIO YOUTUBE -->

<iframe 
id="youtube"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>




<script>


// tombol agus jimin kabur


function kabur(){


let btn=document.getElementById("jimin");


btn.style.left=Math.random()*80+"vw";

btn.style.top=Math.random()*80+"vh";


}





// klik funda


function funda(){


document.getElementById("hasil").style.display="block";


ledak();


}





// setiap klik mouse bunyi youtube


document.addEventListener("click",()=>{


document.getElementById("youtube").src=
"https://www.youtube.com/embed/i6TB1XwE4fI?autoplay=1";


ledak();


});






// emoji keluar


function ledak(){


let emoji=[
"🤣",
"😂",
"❤️",
"🔥",
"🎉",
"🥳"
];


for(let i=0;i<15;i++){


let e=document.createElement("div");


e.className="emoji";


e.innerHTML=
emoji[Math.floor(Math.random()*emoji.length)];



e.style.left=Math.random()*100+"vw";

e.style.top="70%";


document.body.appendChild(e);



setTimeout(()=>{

e.remove();

},2000);


}


}



</script>


</body>
</html>
