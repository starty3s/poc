<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Autoplay Video + Redirect</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<video autoplay muted loop playsinline>
    <source src="vide0.mp4" type="video/mp4">
</video>

<script>
setTimeout(() => {
    window.location.href = "https://google.com";
}, 5000); // 5000 ms = 5 detik
</script>

</body>
</html>
