<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Selamat Ulang Tahun! 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Comic Sans MS', cursive;
}

body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    overflow-x:hidden;
    text-align:center;
    color:white;
}

.container{
    padding:40px 20px;
}

h1{
    font-size:55px;
    animation: goyang 1s infinite alternate;
    text-shadow:3px 3px 10px rgba(0,0,0,.3);
}

@keyframes goyang{
    from{transform:rotate(-3deg);}
    to{transform:rotate(3deg);}
}

p{
    font-size:22px;
    margin:20px;
}

button{
    margin-top:20px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:#ff4d6d;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff1744;
}

.gallery{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    border:6px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.08) rotate(3deg);
}

.marquee{
    font-size:25px;
    margin-top:25px;
    animation:warna 1s infinite;
}

@keyframes warna{
    0%{color:#fff;}
    25%{color:yellow;}
    50%{color:cyan;}
    75%{color:pink;}
    100%{color:white;}
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:jatuh linear infinite;
}

@keyframes jatuh{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>

</head>
<body>

<div class="container">

<h1>🎂 SELAMAT ULANG TAHUN 🎉</h1>

<p id="pesan">
Semoga panjang umur, sehat selalu, banyak rezeki, dan...
</p>

<div class="marquee">
😂 Jangan lupa traktiran ya wkwkwkwkwk 😂
</div>

<button onclick="playMusic()">
▶ Putar Lagu
</button>

<div class="gallery">
<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">
</div>

</div>

<audio id="lagu" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const audio=document.getElementById("lagu");

function playMusic(){
    audio.play();

    alert("🎉 Selamat Ulang Tahun!! 🎂\nSemoga makin kece, makin kaya, makin bahagia! 😂🎉");
}

const kata=[
"🎂 Semoga panjang umur!",
"💰 Semoga cepat kaya!",
"❤️ Semoga bahagia selalu!",
"😂 Semoga gak lupa traktiran!",
"🥳 Hari ini bebas makan kue!",
"🎁 Semoga semua impian tercapai!"
];

let i=0;

setInterval(()=>{
document.getElementById("pesan").innerHTML=kata[i];
i++;
if(i>=kata.length)i=0;
},2000);


// Confetti
for(let i=0;i<120;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.animationDuration=(Math.random()*4+3)+"s";
c.style.animationDelay=Math.random()*5+"s";

const warna=["red","yellow","cyan","lime","pink","orange","white"];

c.style.background=warna[Math.floor(Math.random()*warna.length)];

document.body.appendChild(c);

}
</script>

</body>
</html>
