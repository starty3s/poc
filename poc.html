<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
color:white;
text-align:center;
overflow-x:hidden;
}


/* BACKGROUND */
.background{
position:fixed;
width:100%;
height:100%;
background:url("1.jpeg") center/cover;
z-index:-2;
animation:bg 30s infinite;
}

@keyframes bg{
0%{background-image:url("1.jpeg")}
15%{background-image:url("2.jpeg")}
30%{background-image:url("3.jpeg")}
45%{background-image:url("4.jpeg")}
60%{background-image:url("7.jpeg")}
75%{background-image:url("8.jpeg")}
90%{background-image:url("9.jpeg")}
100%{background-image:url("10.jpeg")}
}


.container{
min-height:100vh;
background:rgba(0,0,0,.35);
padding:30px;
}


h1{
font-size:45px;
margin:20px;
text-shadow:0 0 20px pink;
animation:goyang 1s infinite alternate;
}

@keyframes goyang{
from{transform:rotate(-3deg)}
to{transform:rotate(3deg)}
}


#kata{
font-size:23px;
margin:20px;
}


button{
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
}


/* FOTO */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:1100px;
margin:40px auto;
}


.gallery img{
width:100%;
height:260px;
object-fit:contain;
background:white;
padding:7px;
border-radius:25px;
border:4px solid white;
box-shadow:0 0 25px white;
animation:foto 3s infinite;
cursor:pointer;
}


@keyframes foto{
50%{
transform:translateY(-15px) rotate(3deg);
}
}


/* FOTO KURSOR */

.cursor-foto{
position:fixed;
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
z-index:999;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 20px pink;
}


/* HATI */

.heart{
position:fixed;
font-size:30px;
animation:hati 2s forwards;
}

@keyframes hati{
to{
transform:translateY(-200px);
opacity:0;
}
}


/* BALON */

.balloon{
position:fixed;
bottom:-100px;
font-size:45px;
animation:balon 8s linear infinite;
}

@keyframes balon{
to{
transform:translateY(-120vh);
}
}


/* ENDING */

.ending{
margin-top:50px;
padding:30px;
}

.kado{
display:inline-block;
background:#ff4081;
padding:20px 30px;
border-radius:30px;
font-size:22px;
cursor:pointer;
animation:lucu 1s infinite alternate;
}


@keyframes lucu{
to{
transform:translateY(-15px);
}
}


.pesanAkhir{
display:none;
font-size:25px;
margin-top:30px;
}


.linkLucu{
display:inline-block;
margin-top:20px;
background:red;
color:white;
padding:15px 30px;
border-radius:40px;
text-decoration:none;
}

</style>
</head>


<body>

<div class="background"></div>

<div class="container">


<h1>🎂 SELAMAT ULANG TAHUN 🎉</h1>

<p id="kata">Semoga panjang umur ❤️</p>


<button onclick="musik()">🎵 Putar Lagu</button>


<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">

<img src="7.jpeg">
<img src="8.jpeg">
<img src="9.jpeg">
<img src="10.jpeg">

</div>



<div class="ending">

<div class="kado" onclick="bukaKado()">
🎁 Jangan klik ini...
(bohong 😂)
</div>


<div class="pesanAkhir" id="akhir">

🤣 WKWKWK KENA PRANK!! 🤣
<br><br>

Makasih sudah sampai akhir 😆

<br><br>

<a class="linkLucu"
href="https://youtu.be/ZQ9DPK31tkI?si=B5nEJ56OCkSj43Nc"
target="_blank">

🎬 Klik kalau berani lihat hadiah terakhir 😂

</a>

</div>

</div>


</div>



<audio id="lagu" loop autoplay>
<source src="music.mp3" type="audio/mpeg">
</audio>



<script>

let lagu=document.getElementById("lagu");

function musik(){
lagu.play();
}


window.onload=()=>{
lagu.play().catch(()=>{});
}



/* UCAPAN */

let kata=[
"🎂 Selamat Ulang Tahun!",
"❤️ Semoga selalu bahagia!",
"🥳 Semoga impian tercapai!",
"💰 Semoga rezeki lancar!",
"😂 Jangan lupa traktiran!"
];

let i=0;

setInterval(()=>{
document.getElementById("kata").innerHTML=kata[i];
i++;
if(i>=kata.length)i=0;
},2000);



/* KURSOR FOTO */

let cur=document.createElement("img");
cur.src="8.jpeg";
cur.className="cursor-foto";
document.body.appendChild(cur);


document.onmousemove=e=>{
cur.style.left=e.clientX+"px";
cur.style.top=e.clientY+"px";
}



/* HATI */

document.querySelectorAll(".gallery img").forEach(img=>{

img.onclick=e=>{

for(let i=0;i<10;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";

h.style.left=e.clientX+"px";
h.style.top=e.clientY+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),2000);

}

}

});



/* BALON */

for(let i=0;i<15;i++){

let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";
b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}



/* KADO */

function bukaKado(){

document.querySelector(".kado").innerHTML=
"🎉 SURPRISEEE WKWKWK 😂";

document.getElementById("akhir").style.display="block";

}

</script>


</body>
</html>
