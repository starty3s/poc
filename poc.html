<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chrome Android Intent Harness</title>

<style>
body{
    font-family:monospace;
    padding:20px;
    background:#fff;
    color:#000;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:12px;
}

.card{
    border:1px solid #000;
    padding:12px;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
}

#log{
    margin-top:20px;
    border:1px solid #000;
    padding:10px;
    height:240px;
    overflow:auto;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h2>Chrome Android Intent Test Harness</h2>

<div class="grid">

<div class="card">
<h3>Connectivity</h3>

<button data-action="android.settings.SETTINGS">
Main Settings
</button>

<button data-action="android.settings.WIFI_SETTINGS">
Wi-Fi
</button>

<button data-action="android.settings.BLUETOOTH_SETTINGS">
Bluetooth
</button>

<button data-action="android.settings.AIRPLANE_MODE_SETTINGS">
Airplane Mode
</button>
</div>

<div class="card">
<h3>System</h3>

<button data-action="android.settings.DEVICE_INFO_SETTINGS">
Device Info
</button>

<button data-action="android.settings.DATE_SETTINGS">
Date & Time
</button>

<button data-action="android.settings.LOCALE_SETTINGS">
Locale
</button>
</div>

</div>

<div id="log"></div>

<script>
const logger = document.getElementById("log");

const ENV = {
    ua: navigator.userAgent,
    chrome: /Chrome/i.test(navigator.userAgent),
    android: /Android/i.test(navigator.userAgent),
    webview: /(wv|Version\/[\d.]+).*Chrome/.test(navigator.userAgent)
};

function log(msg){

    const line =
        "[" + new Date().toLocaleTimeString() + "] " + msg;

    logger.textContent += line + "\n";

    logger.scrollTop = logger.scrollHeight;

    console.log(line);
}

function buildIntent(action){

    return (
        "intent:#Intent;" +
        "action=" + action + ";" +
        "category=android.intent.category.DEFAULT;" +
        "end"
    );
}

function safeLaunch(action){

    const uri = buildIntent(action);

    log("ACTION  : " + action);
    log("URI     : " + uri);

    const start = performance.now();

    let hidden = false;

    const visibilityHandler = () => {

        hidden = document.hidden;

        log(
            "VISIBILITY => " +
            (hidden ? "hidden" : "visible")
        );
    };

    document.addEventListener(
        "visibilitychange",
        visibilityHandler
    );

    try{

        /*
         * Standard navigation only.
         * No top-frame escalation.
         * No javascript: nesting.
         * No parser confusion tricks.
         */

        window.location.assign(uri);

        setTimeout(() => {

            const elapsed =
                Math.round(performance.now() - start);

            log("Elapsed: " + elapsed + "ms");

            document.removeEventListener(
                "visibilitychange",
                visibilityHandler
            );

        }, 1500);

    }catch(e){

        log("BLOCKED => " + e.message);

        document.removeEventListener(
            "visibilitychange",
            visibilityHandler
        );
    }
}

document.querySelectorAll("button")
.forEach(btn => {

    btn.addEventListener("click", () => {

        safeLaunch(
            btn.dataset.action
        );

    });

});

log("Environment:");
log(JSON.stringify(ENV,null,2));
</script>

</body>
</html>
