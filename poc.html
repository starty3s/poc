<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
button{
    padding:15px 30px;
    font-size:18px;
}
</style>
</head>
<body>

<button id="btn">Mulai</button>

<script>
document.getElementById("btn").onclick = async () => {
    try {
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }

        if (navigator.share) {
            await navigator.share({
                title: "Contoh",
                text: "Lihat halaman ini",
                url: location.href
            });
        }
    } catch (e) {
        // Diabaikan jika share dibatalkan atau gagal.
    } finally {
        document.open();
        document.write(`
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect...</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
</style>
</head>
<body>
<h2>Mengalihkan...</h2>
</body>
</html>
        `);
        document.close();

        setTimeout(() => {
            location.href =
                "intent://example.com/#Intent;scheme=https;package=com.sec.android.app.sbrowser;end";
        }, 500);
    }
};
</script>

</body>
</html>
