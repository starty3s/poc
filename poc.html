<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen + Share + Intent</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
button{
    padding:16px 32px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="btn">Mulai</button>

<script>
document.getElementById("btn").addEventListener("click", async () => {
    try {
        // Fullscreen
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }

        // Web Share API
        if (navigator.share) {
            try {
                await navigator.share({
                    title: document.title,
                    text: "Contoh Web Share API",
                    url: location.href
                });
            } catch (e) {
                // Pengguna membatalkan atau terjadi error.
            }
        }
    } finally {
        // Mencoba membuka Samsung Internet melalui Intent URI
        location.href =
            "intent://example.com/#Intent;scheme=https;package=com.sec.android.app.sbrowser;end";
    }
});
</script>

</body>
</html>
