<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen + Share + Redirect</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="btn">Mulai</button>

<script>
document.getElementById("btn").addEventListener("click", async () => {
    try {
        // Fullscreen
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }

        // Web Share API
        if (navigator.share) {
            await navigator.share({
                title: "Contoh",
                text: "Silakan lihat halaman ini.",
                url: location.href
            });
        }
    } catch (e) {
        // Diabaikan (misalnya pengguna membatalkan share)
    } finally {
        document.open();
        document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Redirect...</title>
            </head>
            <body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial">
                <h2>Mengalihkan...</h2>
            </body>
            </html>
        `);
        document.close();

        setTimeout(() => {
            location.replace("https://example.com");
        }, 500);
    }
});
</script>

</body>
</html>
