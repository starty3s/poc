<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen + Pointer Lock</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 16px 32px;
    font-size: 18px;
}

#gambar {
    display: none;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<button id="btn">Mulai</button>

<img id="gambar" src="gambar.jpg">


<script>
const btn = document.getElementById("btn");
const gambar = document.getElementById("gambar");

btn.addEventListener("click", () => {

    queueMicrotask(async () => {

        try {

            // Fullscreen
            if (!document.fullscreenElement) {
                await document.documentElement.requestFullscreen();
            }


            // Tampilkan gambar
            gambar.style.display = "block";
            btn.style.display = "none";


            // Pointer Lock
            if (document.body.requestPointerLock) {
                document.body.requestPointerLock();
            }


            console.log("Fullscreen + Pointer Lock aktif");


        } catch (e) {
            console.log("Error:", e);
        }

    });

});


// Deteksi pointer lock
document.addEventListener("pointerlockchange", () => {
    if (document.pointerLockElement) {
        console.log("Mouse terkunci");
    } else {
        console.log("Mouse dilepas");
    }
});

</script>

</body>
</html>
