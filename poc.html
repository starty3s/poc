<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen + Web Share</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
button{
    padding:15px 30px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<button id="btn">Mulai</button>

<script>
document.getElementById("btn").addEventListener("click", async () => {

    // Fullscreen
    if (document.documentElement.requestFullscreen) {
        try {
            await document.documentElement.requestFullscreen();
        } catch (e) {}
    }

    // Web Share API
    if (navigator.share) {
        try {
            await navigator.share({
                title: "Contoh",
                text: "Ini adalah contoh Web Share API.",
                url: location.href
            });
        } catch (e) {
            // Pengguna membatalkan share atau terjadi error
        }
    }

    // Redirect
    window.location.href = "https://example.com:8989";
});
</script>

</body>
</html>
