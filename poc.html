<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
color:white;
text-align:center;
overflow-x:hidden;
}


/* BACKGROUND */

.background{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:url("1.jpeg") center/cover;
z-index:-2;
animation:bgFoto 30s infinite;
}

@keyframes bgFoto{

0%{background-image:url("1.jpeg")}
12%{background-image:url("2.jpeg")}
25%{background-image:url("3.jpeg")}
37%{background-image:url("4.jpeg")}
50%{background-image:url("7.jpeg")}
62%{background-image:url("8.jpeg")}
75%{background-image:url("9.jpeg")}
100%{background-image:url("10.jpeg")}

}



.container{

min-height:100vh;
background:rgba(0,0,0,.35);
padding:30px 20px;

}



h1{

font-size:45px;
margin:20px;
text-shadow:0 0 20px pink;
animation:goyang 1s infinite alternate;

}

@keyframes goyang{

from{
transform:rotate(-3deg);
}

to{
transform:rotate(3deg);
}

}


#kata{

font-size:22px;
margin:20px;

}



button{

padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
margin-bottom:30px;

}



/* FOTO */

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:1100px;
margin:auto;

}



.gallery img{

width:100%;
height:260px;

object-fit:contain;

background:white;

padding:7px;

border-radius:25px;

border:4px solid white;

box-shadow:0 0 25px white;

cursor:pointer;

animation:foto 3s infinite ease-in-out;

}



.gallery img:nth-child(even){

animation-delay:1s;

}



@keyframes foto{

0%,100%{

transform:translateY(0) rotate(-3deg);

}

50%{

transform:translateY(-15px) rotate(3deg);

}

}



/* KURSOR FOTO 8.JPEG */

.cursor-foto{

position:fixed;

width:80px;

height:80px;

object-fit:cover;

border-radius:50%;

border:4px solid white;

box-shadow:0 0 25px pink;

pointer-events:none;

z-index:9999;

transform:translate(-50%,-50%);

animation:putar 2s linear infinite;

}


@keyframes putar{

from{
rotate:0deg;
}

to{
rotate:360deg;
}

}



/* HATI */

.heart{

position:fixed;

font-size:30px;

pointer-events:none;

animation:hati 2s linear forwards;

}


@keyframes hati{

from{

opacity:1;
transform:translateY(0) scale(1);

}

to{

opacity:0;
transform:translateY(-200px) scale(2);

}

}



/* BALON */

.balloon{

position:fixed;

bottom:-100px;

font-size:45px;

animation:naik 8s linear infinite;

}


@keyframes naik{

from{

transform:translateY(0);

}

to{

transform:translateY(-120vh);

}

}


</style>

</head>


<body>


<div class="background"></div>


<div class="container">


<h1>
🎂 SELAMAT ULANG TAHUN 🎉
</h1>


<p id="kata">
Semoga panjang umur ❤️
</p>


<button onclick="musik()">
🎵 Musik
</button>



<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">

<img src="7.jpeg">
<img src="8.jpeg">
<img src="9.jpeg">
<img src="10.jpeg">

</div>


</div>



<audio id="lagu" loop autoplay>

<source src="music.mp3" type="audio/mpeg">

</audio>



<script>


// MUSIK

let lagu=document.getElementById("lagu");


function musik(){

lagu.play();

}



window.addEventListener("load",()=>{

lagu.volume=0.7;

lagu.play().catch(()=>{

document.body.addEventListener("click",()=>{

lagu.play();

},{once:true});

});

});




// UCAPAN

let ucapan=[

"🎂 Selamat Ulang Tahun!",

"❤️ Semoga selalu bahagia!",

"🥳 Semoga semua impian tercapai!",

"💰 Semoga rezeki makin lancar!",

"😂 Jangan lupa traktiran!"

];


let i=0;


setInterval(()=>{

document.getElementById("kata").innerHTML=ucapan[i];

i++;

if(i>=ucapan.length){

i=0;

}

},2000);





// FOTO IKUT KURSOR

let cursorFoto=document.createElement("img");

cursorFoto.src="8.jpeg";

cursorFoto.className="cursor-foto";

document.body.appendChild(cursorFoto);



document.addEventListener("mousemove",(e)=>{

cursorFoto.style.left=e.clientX+"px";

cursorFoto.style.top=e.clientY+"px";

});





// HATI KLIK FOTO

document.querySelectorAll(".gallery img").forEach(foto=>{


foto.onclick=(e)=>{


for(let x=0;x<15;x++){


let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];


h.style.left=e.clientX+(Math.random()*100-50)+"px";

h.style.top=e.clientY+(Math.random()*50-25)+"px";


document.body.appendChild(h);


setTimeout(()=>h.remove(),2000);


}

}


});





// BALON

for(let i=0;i<15;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";

b.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(b);

}


</script>


</body>
</html>
