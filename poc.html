<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday 🎉</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{
min-height:100vh;
color:white;
text-align:center;
overflow-x:hidden;
}


/* BACKGROUND FOTO */
.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("1.jpeg") center/cover no-repeat;

z-index:-2;

animation:bgFoto 30s infinite;
}


@keyframes bgFoto{

0%{
background-image:url("1.jpeg");
}

12%{
background-image:url("2.jpeg");
}

25%{
background-image:url("3.jpeg");
}

37%{
background-image:url("4.jpeg");
}

50%{
background-image:url("7.jpeg");
}

62%{
background-image:url("8.jpeg");
}

75%{
background-image:url("9.jpeg");
}

100%{
background-image:url("10.jpeg");
}

}



/* LAPISAN GELAP */
.container{

min-height:100vh;

background:rgba(0,0,0,.35);

padding:30px 20px;

}



h1{

font-size:45px;

margin:20px;

text-shadow:
0 0 10px pink,
0 0 20px white;

animation:goyang 1s infinite alternate;

}



@keyframes goyang{

from{
transform:rotate(-3deg);
}

to{
transform:rotate(3deg);
}

}



#kata{

font-size:22px;

margin:20px;

}



button{

padding:15px 35px;

border:none;

border-radius:40px;

background:#ff4081;

color:white;

font-size:18px;

cursor:pointer;

margin-bottom:30px;

transition:.3s;

}


button:hover{

transform:scale(1.1);

background:#ff0055;

}



/* GALERI */

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

max-width:1100px;

margin:auto;

}



.gallery img{

width:100%;

height:260px;

object-fit:contain;

background:white;

padding:7px;

border-radius:25px;

border:4px solid white;

box-shadow:
0 0 25px white,
0 10px 30px black;

cursor:pointer;

animation:foto 3s infinite ease-in-out;

transition:.4s;

}



.gallery img:nth-child(even){

animation-delay:1s;

}



.gallery img:hover{

transform:scale(1.12) rotate(5deg);

}



@keyframes foto{

0%,100%{

transform:translateY(0) rotate(-3deg);

}


50%{

transform:translateY(-15px) rotate(3deg);

}

}




/* HATI */

.heart{

position:fixed;

font-size:30px;

pointer-events:none;

animation:hati 2s linear forwards;

}



@keyframes hati{

from{

opacity:1;

transform:translateY(0) scale(1);

}

to{

opacity:0;

transform:translateY(-200px) scale(2);

}

}



/* BALON */

.balloon{

position:fixed;

bottom:-100px;

font-size:45px;

animation:naik 8s linear infinite;

}



@keyframes naik{

from{

transform:translateY(0);

}

to{

transform:translateY(-120vh);

}

}


</style>

</head>


<body>


<div class="background"></div>


<div class="container">


<h1>
🎂 SELAMAT ULANG TAHUN 🎉
</h1>


<p id="kata">
Semoga panjang umur ❤️
</p>


<button onclick="musik()">
🎵 Putar Lagu
</button>



<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">

<img src="7.jpeg">
<img src="8.jpeg">
<img src="9.jpeg">
<img src="10.jpeg">

</div>



</div>



<audio id="lagu" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>




<script>


function musik(){

document.getElementById("lagu").play();

}



let ucapan=[

"🎂 Selamat Ulang Tahun!",

"❤️ Semoga selalu bahagia!",

"🥳 Semoga semua cita-cita tercapai!",

"💰 Semoga rezekinya lancar!",

"😂 Jangan lupa traktiran wkwkwk!"

];


let i=0;


setInterval(()=>{

document.getElementById("kata").innerHTML=ucapan[i];

i++;

if(i>=ucapan.length){

i=0;

}

},2000);





/* KLIK FOTO KELUAR HATI */

document.querySelectorAll("img").forEach(foto=>{


foto.onclick=function(e){


for(let x=0;x<15;x++){


let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];


h.style.left=e.clientX+(Math.random()*100-50)+"px";

h.style.top=e.clientY+(Math.random()*50-25)+"px";


document.body.appendChild(h);


setTimeout(()=>{

h.remove();

},2000);


}


}


});






/* BALON */

for(let i=0;i<15;i++){


let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";

b.style.animationDelay=Math.random()*8+"s";


document.body.appendChild(b);


}


</script>


</body>
</html>
