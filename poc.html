<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Happy Birthday 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd6e0);
text-align:center;
overflow-x:hidden;
color:#fff;
animation:bg 8s infinite alternate;
}
@keyframes bg{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(50deg)}
}

h1{
margin:30px 0;
font-size:45px;
animation:goyang .8s infinite alternate;
}

@keyframes goyang{
from{transform:rotate(-2deg)}
to{transform:rotate(2deg)}
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:20px;
border:5px solid white;
box-shadow:0 10px 20px rgba(0,0,0,.3);
animation:joget 2.5s infinite ease-in-out;
transition:.3s;
cursor:pointer;
}

.gallery img:nth-child(2){animation-delay:.3s}
.gallery img:nth-child(3){animation-delay:.6s}
.gallery img:nth-child(4){animation-delay:.9s}

.gallery img:hover{
transform:scale(1.1) rotate(5deg);
}

@keyframes joget{
0%,100%{transform:translateY(0) rotate(-2deg)}
50%{transform:translateY(-10px) rotate(2deg)}
}

.heart{
position:fixed;
font-size:28px;
animation:naik 2s linear forwards;
pointer-events:none;
}

@keyframes naik{
to{
transform:translateY(-180px) scale(2);
opacity:0;
}
}
</style>

</head>
<body>

<h1>🎂 SELAMAT ULANG TAHUN 🎉</h1>

<p id="kata">Semoga panjang umur ❤️</p>
<br>

<button onclick="playMusic()">🎵 Putar Lagu</button>

<div class="gallery">
<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
document.getElementById("music").play();
}

const ucapan=[
"🎂 Selamat Ulang Tahun!",
"🥳 Semoga Bahagia Selalu!",
"💖 Semoga Semua Impian Tercapai!",
"💸 Semoga Rezekinya Lancar!",
"😂 Jangan Lupa Traktiran WKWKWK"
];

let i=0;
setInterval(()=>{
document.getElementById("kata").innerHTML=ucapan[i];
i=(i+1)%ucapan.length;
},2000);

document.querySelectorAll("img").forEach(img=>{
img.onclick=(e)=>{
for(let i=0;i<10;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];
h.style.left=(e.clientX+Math.random()*80-40)+"px";
h.style.top=(e.clientY+Math.random()*40-20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}
}
});
</script>

</body>
</html>
