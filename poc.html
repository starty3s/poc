<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>example.com:8089</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            overflow: hidden;
        }
        .fake-bar {
            background: #1a73e8;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10000;
        }
        .loading {
            position: fixed;
            top: 45px;
            left: 0;
            width: 0;
            height: 3px;
            background: #34a853;
            animation: load 3s linear forwards;
            z-index: 9999;
        }
        @keyframes load {
            to { width: 100%; }
        }
        .content {
            margin-top: 80px;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- Fake Address Bar -->
    <div class="fake-bar">
        🔒 https://<strong>example.com:8089</strong>
        <span style="margin-left:auto; font-size:12px;">✓ Aman</span>
    </div>

    <!-- Loading Bar -->
    <div class="loading"></div>

    <div class="content">
        <h1>Sedang memuat halaman...</h1>
        <p>https://example.com:8089</p>
    </div>

    <script>
        // Redirect beneran setelah loading selesai (3 detik)
        setTimeout(() => {
            window.location.href = "https://example.com";
            // Kalau mau pakai port (meski kemungkinan besar tidak ada server):
            // window.location.href = "https://example.com:8089";
        }, 3000);
    </script>
</body>
</html>
