<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤣 Happy Birthday Gokil 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Comic Sans MS",Arial;
}

body{
overflow-x:hidden;
text-align:center;
color:white;
min-height:100vh;
}


/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-5;

background:url("1.jpeg") center/cover;

animation:bgjalan 25s infinite;
}


@keyframes bgjalan{

0%{
background-image:url("1.jpeg");
}

15%{
background-image:url("2.jpeg");
}

30%{
background-image:url("3.jpeg");
}

45%{
background-image:url("4.jpeg");
}

60%{
background-image:url("7.jpeg");
}

75%{
background-image:url("8.jpeg");
}

90%{
background-image:url("9.jpeg");
}

100%{
background-image:url("10.jpeg");
}

}




.main{

min-height:100vh;

background:rgba(0,0,0,.35);

padding:30px;

}



h1{

font-size:50px;

text-shadow:
3px 3px red,
0 0 20px yellow;

animation:goyang .7s infinite alternate;

}


@keyframes goyang{

from{
transform:rotate(-5deg);
}

to{
transform:rotate(5deg);
}

}




.kue{

font-size:100px;

animation:kue 1s infinite alternate;

}


@keyframes kue{

from{
transform:translateY(0);
}

to{
transform:translateY(-20px);
}

}



#pesan{

font-size:25px;

margin:20px;

font-weight:bold;

}



button{

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff0080;

color:white;

font-size:20px;

cursor:pointer;

box-shadow:0 0 20px white;

}





/* GALERI */

.gallery{

max-width:1100px;

margin:40px auto;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

}



.gallery img{

width:100%;

height:260px;

object-fit:contain;

background:white;

padding:8px;

border-radius:30px;

border:5px solid white;

box-shadow:0 0 30px pink;

cursor:pointer;

animation:fotogila 2s infinite;

}



@keyframes fotogila{

0%,100%{

transform:rotate(-5deg);

}

50%{

transform:rotate(5deg) translateY(-15px);

}

}



/* KURSOR FOTO */

.cursorFoto{

position:fixed;

width:90px;

height:90px;

border-radius:50%;

object-fit:cover;

border:5px solid yellow;

box-shadow:0 0 30px red;

pointer-events:none;

z-index:9999;

transform:translate(-50%,-50%);

}





/* KADO */

.kado{

font-size:90px;

cursor:pointer;

animation:kado 1s infinite alternate;

margin-top:40px;

}


@keyframes kado{

from{
transform:rotate(-10deg);
}

to{
transform:rotate(10deg);
}

}



#hadiah{

display:none;

background:#ff1493;

padding:30px;

border-radius:30px;

font-size:25px;

margin:20px;

}



.link{

display:inline-block;

background:red;

color:white;

padding:15px 30px;

border-radius:40px;

text-decoration:none;

}





/* EMOJI */

.emoji{

position:fixed;

font-size:35px;

pointer-events:none;

animation:naik 2s forwards;

}



@keyframes naik{

to{

transform:translateY(-200px) scale(2);

opacity:0;

}

}





/* BALON */


.balon{

position:fixed;

bottom:-100px;

font-size:50px;

animation:balon 8s linear infinite;

}


@keyframes balon{

to{

transform:translateY(-120vh);

}

}


</style>

</head>


<body>


<div class="bg"></div>


<div class="main">


<h1>
🎂 ULANG TAHUN FJ NIH BOS HEHEHEEH #GUBERNUR BEKASI PERIODE 2026 - 2012 🎉
</h1>


<div class="kue">
🎂
</div>


<p id="pesan">
Tunggu kejutan... 🤣
</p>


<button onclick="musik()">
🎵 Putar Musik
</button>



<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">
<img src="4.jpeg">

<img src="7.jpeg">
<img src="8.jpeg">
<img src="9.jpeg">
<img src="10.jpeg">

</div>


<div class="kado" onclick="buka()">
🎁
</div>


<div id="hadiah">

🤣 WKWKWK KENA PRANK 🤣

<br><br>

Kamu kuat juga sampai bawah 😂

<br><br>

<a class="link"
href="https://youtu.be/ZQ9DPK31tkI?si=B5nEJ56OCkSj43Nc"
target="_blank">

🎬 Klik hadiah terakhir kalau berani

</a>

</div>


<audio id="lagu" loop>

<source src="music.mp3">

</audio>

  <script>


// =====================
// MUSIK
// =====================

let lagu=document.getElementById("lagu");


function musik(){

lagu.play();

}


window.onload=function(){

lagu.volume=0.7;

lagu.play().catch(()=>{

});

};





// =====================
// TULISAN ABSURD
// =====================

let kata=[

"🎂 Selamat ulang tahun manusia paling keren 😎",

"🤣 Umur nambah tapi kelakuan jangan nambah aneh",

"💰 Semoga saldo naik bukan cuma harapan",

"🍗 Semoga makanan selalu enak",

"😂 Jangan lupa traktiran ya bos",

"❤️ Semoga bahagia setiap hari",

"🔥 Tetap jadi manusia paling random"

];


let nomor=0;


setInterval(()=>{


document.getElementById("pesan").innerHTML=kata[nomor];


nomor++;


if(nomor>=kata.length){

nomor=0;

}


},2000);








// =====================
// FOTO IKUT KURSOR
// =====================


let fotoCursor=document.createElement("img");


fotoCursor.src="8.jpeg";


fotoCursor.className="cursorFoto";


document.body.appendChild(fotoCursor);



document.addEventListener("mousemove",(e)=>{


fotoCursor.style.left=e.clientX+"px";

fotoCursor.style.top=e.clientY+"px";


});









// =====================
// KLIK LAYAR KELUAR EMOJI
// =====================


document.addEventListener("click",(e)=>{


let emoji=[

"🤣",
"😂",
"❤️",
"🎉",
"🔥",
"🥳",
"💰"

];


for(let i=0;i<7;i++){


let em=document.createElement("div");


em.className="emoji";


em.innerHTML=
emoji[Math.floor(Math.random()*emoji.length)];



em.style.left=
e.clientX+(Math.random()*100-50)+"px";


em.style.top=
e.clientY+(Math.random()*50-25)+"px";



document.body.appendChild(em);



setTimeout(()=>{

em.remove();

},2000);


}


});







// =====================
// FOTO KLIK KELUAR HATI
// =====================


document.querySelectorAll(".gallery img")
.forEach((img)=>{


img.onclick=function(e){


for(let i=0;i<20;i++){


let h=document.createElement("div");


h.className="emoji";


h.innerHTML="❤️";


h.style.left=
e.clientX+(Math.random()*100-50)+"px";


h.style.top=
e.clientY+(Math.random()*100-50)+"px";



document.body.appendChild(h);



setTimeout(()=>{

h.remove();

},2000);



}


}


});








// =====================
// BALON RANDOM
// =====================


for(let i=0;i<25;i++){


let b=document.createElement("div");


b.className="balon";


b.innerHTML=[
"🎈",
"🎈",
"⭐",
"🎉"
][Math.floor(Math.random()*4)];



b.style.left=Math.random()*100+"vw";


b.style.animationDelay=
Math.random()*8+"s";


b.style.animationDuration=
(5+Math.random()*8)+"s";



document.body.appendChild(b);


}








// =====================
// KADO PRANK
// =====================


function buka(){


let kotak=document.querySelector(".kado");


kotak.innerHTML="💥 BOOMMM 🤣";


document.getElementById("hadiah")
.style.display="block";



for(let i=0;i<50;i++){


let ledak=document.createElement("div");


ledak.className="emoji";


ledak.innerHTML=[

"🎉",
"🤣",
"❤️",
"🔥"

][Math.floor(Math.random()*4)];



ledak.style.left=
Math.random()*100+"vw";


ledak.style.top="50%";



document.body.appendChild(ledak);



setTimeout(()=>{

ledak.remove();

},2000);


}


}






// =====================
// FOTO BERKEDIP
// =====================


setInterval(()=>{


document.querySelectorAll(".gallery img")
.forEach(img=>{


img.style.boxShadow=
"0 0 50px yellow";


setTimeout(()=>{


img.style.boxShadow=
"0 0 30px pink";


},300);



});


},3000);



</script>


</body>
</html>
